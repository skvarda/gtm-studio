function drawText(ctx, text, x, y, color, scale) {
  if (scale === undefined) scale = 1;
  ctx.fillStyle = color;
  let cx = x;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], glyph = FONT_DATA[ch];
    if (ch === ' ') { cx += 4 * scale; continue; }
    if (!glyph) { cx += (FONT_W + 1) * scale; continue; }
    for (let r = 0; r < FONT_H; r++)
      for (let c = 0; c < FONT_W; c++)
        if (glyph[r * FONT_W + c]) ctx.fillRect(cx + c * scale, y + r * scale, scale, scale);
    cx += (FONT_W + 1) * scale;
  }
}

function measureText(text, scale) {
  if (scale === undefined) scale = 1;
  let w = 0;
  for (let i = 0; i < text.length; i++) w += (text[i] === ' ') ? 4 * scale : (FONT_W + 1) * scale;
  if (text.length > 0) w -= 1 * scale;
  return { width: w, height: FONT_H * scale };
}

function wrapText(text, maxWidth, scale) {
  const words = text.split(' '), lines = [];
  let cur = '';
  for (let i = 0; i < words.length; i++) {
    const w = words[i];
    const test = cur ? cur + ' ' + w : w;
    if (measureText(test, scale).width > maxWidth) {
      if (cur) lines.push(cur);
      cur = w;
    } else cur = test;
  }
  if (cur) lines.push(cur);
  return lines;
}

function formatCash(amount) {

}
function formatCashAbs(n) {
  return Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// --- Action Point System ---
function getAP() { return gameState.ap; }
function spendAP(cost) {
  if (gameState.ap < cost) return false;
  gameState.ap -= cost;
  return true;
}
function canAfford(actionId) {
  var action = null;
  for (var i = 0; i < ENGINE.actions.length; i++) {
    if (ENGINE.actions[i].id === actionId) { action = ENGINE.actions[i]; break; }
  }
  if (!action) return false;
  return gameState.ap >= action.cost;
}
function resetAP() { gameState.ap = gameState.maxAP; }

function performAction(actionId) {
  var action = null;
  for (var i = 0; i < ENGINE.actions.length; i++) {
    if (ENGINE.actions[i].id === actionId) { action = ENGINE.actions[i]; break; }
  }
  if (!action) return { success: false, message: 'Unknown action.' };
  if (action.cost > 0 && gameState.ap < action.cost) return { success: false, message: 'Not enough AP.' };
  if (!action.enabled(gameState)) return { success: false, message: 'Action not available.' };
  if (action.cost > 0) spendAP(action.cost);
  var result = action.execute(gameState);
  return { success: true, message: result.text, effects: result.effects };
}

function getAvailableActions() {
  return ENGINE.actions.filter(function(a) {
    return a.enabled(gameState) && (a.cost === 0 || gameState.ap >= a.cost);
  });
}

// --- Economy Tick ---
function economyTick() {
  var gs = gameState;
  // Revenue: each customer pays ~$99/mo = ~$23/week
  var weeklyRevPerCustomer = 23;
  var weeklyRevenue = gs.customers * weeklyRevPerCustomer;

  // Burn: $2,000/week base + employee salaries
  var employeeSalaries = 0;
  for (var i = 0; i < gs.employees.length; i++) employeeSalaries += Math.floor((gs.employees[i].salary || 0) / 4);
  var weeklyBurn = 2000 + employeeSalaries;

  // Apply revenue and burn
  gs.cash += weeklyRevenue;
  gs.cash -= weeklyBurn;

  // MRR = customers * $99
  gs.mrr = gs.customers * 99;

  // Churn: 3% per week, only if customers > 5
  var churnedCustomers = 0;
  if (gs.customers > 5) {
    var churnRate = 0.03;
    // Bug penalty: bugs > 10 doubles churn
    if (gs.bugs > 10) churnRate = 0.06;
    for (var i = 0; i < gs.customers; i++) {
      if (Math.random() < churnRate) churnedCustomers++;
    }
    churnedCustomers = Math.min(churnedCustomers, gs.customers);
    gs.customers = Math.max(0, gs.customers - churnedCustomers);
    gs.mrr = gs.customers * 99;
  }

  // Random bugs from product complexity
  if (gs.product > 0 && Math.random() < 0.25) {
    gs.bugs += 1;
  }

  // Runway calculation
  var netBurn = weeklyBurn - weeklyRevenue;
  var runway;
  if (netBurn <= 0) {
    runway = 999; // profitable
  } else if (gs.cash <= 0) {
    runway = 0;
  } else {
    runway = Math.floor(gs.cash / netBurn);
  }

  // Game over check
  if (gs.cash <= 0 && runway <= 0) {
    gs.gameOver = true;
  }

  return {
    revenue: weeklyRevenue,
    burn: weeklyBurn,
    churnedCustomers: churnedCustomers,
    runway: runway,
    cashChange: weeklyRevenue - weeklyBurn
  };
}

// --- Day Cycle ---
function getEra(day) {
  if (day <= 10) return 'garage';
  if (day <= 30) return 'push';
  if (day <= 60) return 'machine';
  return 'empire';
}

function getDayPhase() { return gameState.phase; }

function initDay() {
  var gs = gameState;
  gs.phase = 'morning';
  resetAP();
  gs.inbox = generateEmails(gs.day);
  gs.uiState = 'inbox';
  gs.selectedIndex = 0;
  gs.actionResult = null;
  gs.eveningSummary = null;
}

function advancePhase() {
  var gs = gameState;
  if (gs.phase === 'morning') {
    if (!allEmailsRead()) return; // gate: must read all emails
    gs.phase = 'afternoon';
    gs.uiState = 'action_menu';
    gs.selectedIndex = 0;
    return 'afternoon';
  } else if (gs.phase === 'afternoon') {
    gs.phase = 'evening';
    gs.eveningSummary = economyTick();
    gs.uiState = 'evening_summary';
    return 'evening';
  } else if (gs.phase === 'evening') {
    advanceDay();
    return 'morning';
  }
}

function advanceDay() {
  var gs = gameState;
  gs.day++;
  gs.era = getEra(gs.day);
  resetAP();
  gs.inbox = generateEmails(gs.day);
  gs.phase = 'morning';
  gs.uiState = 'inbox';
  gs.selectedIndex = 0;
  gs.actionResult = null;
  gs.eveningSummary = null;
}

function generateEmails(day) {
  var gs = gameState;
  var emails = [];

  // Separate mandatory (exact day match) from pool
  var mandatory = [];
  var storyPool = [];
  var regularPool = [];

  for (var i = 0; i < EMAIL_TEMPLATES.length; i++) {
    var tmpl = EMAIL_TEMPLATES[i];
    // Check day range
    if (day < tmpl.day_range[0] || day > tmpl.day_range[1]) continue;
    // Check unique dedup
    if (tmpl.unique && gs.emailsRead.indexOf(tmpl.id) !== -1) continue;

    // Mandatory: single-day range matching current day
    if (tmpl.day_range[0] === tmpl.day_range[1] && tmpl.day_range[0] === day) {
      mandatory.push(tmpl);
    } else if (tmpl.unique && tmpl.category === 'story') {
      storyPool.push(tmpl);
    } else {
      regularPool.push(tmpl);
    }
  }

  // Add all mandatory emails first
  for (var i = 0; i < mandatory.length; i++) {
    emails.push(makeEmail(mandatory[i]));
  }

  // Prioritize unread unique story emails
  var shuffledStory = storyPool.sort(function() { return Math.random() - 0.5; });
  for (var i = 0; i < shuffledStory.length && emails.length < 2; i++) {
    emails.push(makeEmail(shuffledStory[i]));
  }

  // Fill remaining slots from regular pool (target 2-4 total)
  var target = 2 + Math.floor(Math.random() * 3); // 2, 3, or 4
  var shuffledRegular = regularPool.sort(function() { return Math.random() - 0.5; });
  for (var i = 0; i < shuffledRegular.length && emails.length < target; i++) {
    emails.push(makeEmail(shuffledRegular[i]));
  }

  // Ensure at least 1 email
  if (emails.length === 0) {
    emails.push({
      id: 'fallback_' + day,
      from: 'Jordan',
      subject: 'Day ' + day,
      body: 'Another day, another chance to not go bankrupt. Get to work.',
      read: false
    });
  }

  return emails;
}

function makeEmail(tmpl) {
  if (tmpl.unique) gameState.emailsRead.push(tmpl.id);
  return {
    id: tmpl.id,
    from: tmpl.from,
    subject: tmpl.subject,
    body: tmpl.body,
    read: false
  };
}

function markEmailRead(index) {
  if (index >= 0 && index < gameState.inbox.length) {
    gameState.inbox[index].read = true;
  }
}

function allEmailsRead() {
  var inbox = gameState.inbox;
  for (var i = 0; i < inbox.length; i++) {
    if (!inbox[i].read) return false;
  }
  return true;
}

// --- Drawing Functions ---

function drawHUD(ctx) {
  var gs = gameState;

  // Background bar
  ctx.fillStyle = PAL.hudBg;
  ctx.fillRect(0, 0, 640, 24);
  ctx.fillStyle = '#2a2a3e';
  ctx.fillRect(0, 24, 640, 1);

  // Day
  drawText(ctx, 'DAY ' + gs.day, 6, 4, PAL.hudText, 1);

  // Phase indicator
  drawText(ctx, gs.phase.toUpperCase(), 6, 14, PAL.textSecondary, 1);

  // Cash (red when negative)
  var cashColor = gs.cash < 0 ? PAL.red : PAL.textAccent;
  drawText(ctx, formatCash(gs.cash), 100, 4, cashColor, 1);

  // MRR
  drawText(ctx, 'MRR ' + formatCash(gs.mrr), 230, 4, PAL.positive, 1);

  // Runway in weeks
  var weeklyBurn = 2000;
  for (var i = 0; i < gs.employees.length; i++) weeklyBurn += Math.floor((gs.employees[i].salary || 0) / 4);
  var weeklyRev = gs.customers * 23;
  var runwayStr;
  if (weeklyBurn <= weeklyRev) {
    runwayStr = 'RUNWAY ~';
  } else if (gs.cash <= 0) {
    runwayStr = 'RUNWAY 0W';
  } else {
    var rwWeeks = Math.floor(gs.cash / (weeklyBurn - weeklyRev));
    runwayStr = 'RUNWAY ' + rwWeeks + 'W';
  }
  var rwColor;
  if (runwayStr === 'RUNWAY ~') {
    rwColor = PAL.positive;
  } else {
    var rwNum = parseInt(runwayStr.replace(/\D/g, ''));
    rwColor = (rwNum < 24) ? PAL.negative : PAL.hudText;
  }
  drawText(ctx, runwayStr, 370, 4, rwColor, 1);

  // AP diamond pips - filled = available, hollow = spent
  drawText(ctx, 'AP', 480, 4, PAL.hudText, 1);
  for (var i = 0; i < gs.maxAP; i++) {
    var px = 504 + i * 14;
    var py = 7;
    var filled = i < gs.ap;
    if (filled) {
      // Filled diamond
      ctx.fillStyle = PAL.apFull;
      ctx.beginPath();
      ctx.moveTo(px, py - 5);
      ctx.lineTo(px + 5, py);
      ctx.lineTo(px, py + 5);
      ctx.lineTo(px - 5, py);
      ctx.closePath();
      ctx.fill();
    } else {
      // Hollow diamond (outline only)
      ctx.strokeStyle = PAL.apEmpty;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px, py - 5);
      ctx.lineTo(px + 5, py);
      ctx.lineTo(px, py + 5);
      ctx.lineTo(px - 5, py);
      ctx.closePath();
      ctx.stroke();
    }
  }

  // Era
  drawText(ctx, gs.era.toUpperCase(), 600, 14, PAL.textSecondary, 1);
}

function drawInbox(ctx) {
  var gs = gameState;
  var inbox = gs.inbox;
  var sel = gs.selectedIndex;

  // Full screen overlay
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);

  // Header
  ctx.fillStyle = PAL.hudBg;
  ctx.fillRect(0, 0, 640, 30);
  drawText(ctx, 'INBOX - DAY ' + gs.day + ' MORNING', 10, 8, PAL.textAccent, 2);

  var unreadCount = 0;
  for (var i = 0; i < inbox.length; i++) { if (!inbox[i].read) unreadCount++; }

  if (unreadCount > 0) {
    drawText(ctx, unreadCount + ' UNREAD', 520, 12, PAL.emailUnread, 1);
  } else {
    drawText(ctx, 'ALL READ', 530, 12, PAL.positive, 1);
  }

  // Left panel: email list
  var listW = 220;
  ctx.fillStyle = PAL.emailBg;
  ctx.fillRect(0, 30, listW, 330);

  for (var i = 0; i < inbox.length; i++) {
    var email = inbox[i];
    var ey = 34 + i * 40;
    if (ey > 320) break; // prevent overflow

    if (i === sel) {
      ctx.fillStyle = PAL.emailSelected;
      ctx.fillRect(0, ey, listW, 38);
    }

    // Unread dot
    if (!email.read) {
      ctx.fillStyle = PAL.emailUnread;
      ctx.beginPath();
      ctx.arc(10, ey + 12, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // From
    drawText(ctx, email.from, 18, ey + 4, email.read ? PAL.emailRead : PAL.textPrimary, 1);
    // Subject (truncated)
    var maxSubjW = listW - 24;
    var subj = email.subject;
    while (measureText(subj, 1).width > maxSubjW && subj.length > 3) {
      subj = subj.slice(0, -1);
    }
    if (subj.length < email.subject.length) subj += '..';
    drawText(ctx, subj, 18, ey + 16, email.read ? PAL.emailRead : PAL.textSecondary, 1);

    // Separator
    ctx.fillStyle = '#1a2a4e';
    ctx.fillRect(10, ey + 38, listW - 20, 1);
  }

  // Right panel: email detail
  ctx.fillStyle = '#111122';
  ctx.fillRect(listW, 30, 640 - listW, 330);

  if (sel >= 0 && sel < inbox.length) {
    var email = inbox[sel];
    var rx = listW + 16;

    drawText(ctx, email.subject, rx, 44, PAL.textAccent, 2);
    drawText(ctx, 'FROM: ' + email.from, rx, 68, PAL.textSecondary, 1);

    ctx.fillStyle = '#222244';
    ctx.fillRect(rx, 82, 640 - listW - 32, 1);

    var bodyLines = wrapText(email.body, 640 - listW - 40, 1);
    for (var i = 0; i < bodyLines.length; i++) {
      drawText(ctx, bodyLines[i], rx, 92 + i * 14, PAL.textPrimary, 1);
    }
  }

  // Bottom instructions
  ctx.fillStyle = PAL.hudBg;
  ctx.fillRect(0, 336, 640, 24);

  drawText(ctx, 'UP/DOWN: Navigate', 10, 342, PAL.textSecondary, 1);
  drawText(ctx, 'ENTER: Read', 200, 342, PAL.textSecondary, 1);

  if (unreadCount === 0) {
    drawText(ctx, 'E: Start your day', 400, 342, PAL.positive, 1);
  } else {
    drawText(ctx, 'Read all emails to continue', 380, 342, PAL.emailUnread, 1);
  }
}

function drawActionMenu(ctx) {
  var gs = gameState;
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);

  // Header
  drawHUD(ctx);

  // Title
  drawText(ctx, 'AFTERNOON - CHOOSE AN ACTION', 10, 32, PAL.textAccent, 2);

  // Action list
  var actions = ENGINE.actions;
  var sel = gs.selectedIndex;

  for (var i = 0; i < actions.length; i++) {
    var action = actions[i];
    var ay = 58 + i * 38;
    var isSelected = i === sel;
    var affordable = action.cost === 0 || gs.ap >= action.cost;
    var enabled = action.enabled(gs) && affordable;

    // Selection highlight
    if (isSelected) {
      ctx.fillStyle = PAL.buttonHover;
    } else {
      ctx.fillStyle = enabled ? PAL.buttonBg : '#1a1a1f';
    }
    ctx.fillRect(10, ay, 620, 36);

    // Cursor
    if (isSelected) {
      drawText(ctx, '>', 16, ay + 6, PAL.textAccent, 2);
    }

    // Label - grayed out if not affordable/enabled
    var labelColor;
    if (!enabled) {
      labelColor = PAL.apEmpty;
    } else if (isSelected) {
      labelColor = PAL.textAccent;
    } else {
      labelColor = PAL.textPrimary;
    }
    drawText(ctx, action.label, 40, ay + 4, labelColor, 2);

    // AP cost
    if (action.cost > 0) {
      var costStr = action.cost + ' AP';
      var costColor = affordable ? PAL.apFull : PAL.negative;
      drawText(ctx, costStr, 560, ay + 8, costColor, 1);
    } else {
      drawText(ctx, 'FREE', 560, ay + 8, PAL.positive, 1);
    }

    // Description line for selected action
    if (isSelected) {
      var desc = action.flavor;
      if (action.id === 'fix_bugs') desc += ' (' + gs.bugs + ' bugs)';
      drawText(ctx, desc, 40, ay + 22, PAL.textSecondary, 1);

      if (!enabled) {
        if (!action.enabled(gs)) {
          drawText(ctx, 'Not available', 430, ay + 22, PAL.negative, 1);
        } else {
          drawText(ctx, 'Not enough AP', 430, ay + 22, PAL.negative, 1);
        }
      }
    }
  }

  // Bottom bar
  ctx.fillStyle = PAL.hudBg;
  ctx.fillRect(0, 336, 640, 24);
  drawText(ctx, 'UP/DOWN: Navigate   ENTER: Select', 10, 342, PAL.textSecondary, 1);
  drawText(ctx, 'AP: ' + gs.ap + '/' + gs.maxAP, 540, 342, PAL.apFull, 1);
}

function drawActionResult(ctx) {
  var gs = gameState;
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);
  drawHUD(ctx);

  var result = gs.actionResult;
  if (!result) return;

  // Result box
  var boxW = 500, boxH = 180;
  var bx = Math.floor((640 - boxW) / 2);
  var by = Math.floor((360 - boxH) / 2);

  ctx.fillStyle = PAL.emailBg;
  ctx.fillRect(bx, by, boxW, boxH);
  ctx.strokeStyle = PAL.textAccent;
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, boxW, boxH);

  drawText(ctx, 'RESULT', bx + 10, by + 10, PAL.textAccent, 2);

  var lines = wrapText(result.message, boxW - 30, 1);
  for (var i = 0; i < lines.length; i++) {
    drawText(ctx, lines[i], bx + 14, by + 40 + i * 14, PAL.textPrimary, 1);
  }

  // Show effects
  var ey = by + 40 + lines.length * 14 + 14;
  if (result.effects) {
    var ex = bx + 14;
    if (result.effects.customers) { drawText(ctx, '+' + result.effects.customers + ' CUSTOMERS', ex, ey, PAL.positive, 1); ex += 160; }
    if (result.effects.product) { drawText(ctx, '+' + result.effects.product + ' PRODUCT', ex, ey, PAL.positive, 1); ex += 140; }
    if (result.effects.bugs) { drawText(ctx, result.effects.bugs + ' BUGS', ex, ey, result.effects.bugs < 0 ? PAL.positive : PAL.negative, 1); ex += 120; }
    if (result.effects.morale) { drawText(ctx, '+' + result.effects.morale + ' MORALE', ex, ey, PAL.positive, 1); }
  }

  // Continue prompt
  var apLeft = gs.ap;
  if (apLeft > 0) {
    drawText(ctx, 'SPACE: Continue (' + apLeft + ' AP left)', bx + 10, by + boxH - 20, PAL.textSecondary, 1);
  } else {
    drawText(ctx, 'SPACE: End Day (0 AP left)', bx + 10, by + boxH - 20, PAL.textSecondary, 1);
  }
}

function drawEveningSummary(ctx) {
  var gs = gameState;
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);

  var summary = gs.eveningSummary;
  if (!summary) return;

  var boxW = 440, boxH = 300;
  var bx = Math.floor((640 - boxW) / 2);
  var by = Math.floor((360 - boxH) / 2);

  ctx.fillStyle = PAL.emailBg;
  ctx.fillRect(bx, by, boxW, boxH);
  ctx.strokeStyle = PAL.apFull;
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, boxW, boxH);

  drawText(ctx, 'EVENING REPORT - DAY ' + gs.day, bx + 10, by + 10, PAL.textAccent, 2);

  var ly = by + 40;
  var lh = 18;

  drawText(ctx, 'REVENUE THIS WEEK:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, formatCash(summary.revenue), bx + 250, ly, PAL.positive, 1);
  ly += lh;

  drawText(ctx, 'BURN THIS WEEK:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, formatCash(summary.burn), bx + 250, ly, PAL.negative, 1);
  ly += lh;

  var net = summary.cashChange;
  drawText(ctx, 'NET CHANGE:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, (net >= 0 ? '+' : '') + formatCash(net), bx + 250, ly, net >= 0 ? PAL.positive : PAL.negative, 1);
  ly += lh + 6;

  ctx.fillStyle = '#222244';
  ctx.fillRect(bx + 20, ly, boxW - 40, 1);
  ly += 10;

  drawText(ctx, 'CUSTOMERS:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, '' + gs.customers, bx + 250, ly, PAL.textPrimary, 1);
  ly += lh;

  if (summary.churnedCustomers > 0) {
    drawText(ctx, 'CHURNED:', bx + 20, ly, PAL.textSecondary, 1);
    drawText(ctx, '-' + summary.churnedCustomers, bx + 250, ly, PAL.negative, 1);
    ly += lh;
  }

  drawText(ctx, 'MRR:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, formatCash(gs.mrr), bx + 250, ly, PAL.positive, 1);
  ly += lh;

  drawText(ctx, 'CASH:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, formatCash(gs.cash), bx + 250, ly, gs.cash > 0 ? PAL.textAccent : PAL.negative, 1);
  ly += lh;

  // Runway
  drawText(ctx, 'RUNWAY:', bx + 20, ly, PAL.textSecondary, 1);
  var rwStr = summary.runway >= 999 ? '~' : summary.runway + 'w';
  var rwCol = summary.runway >= 999 ? PAL.positive : (summary.runway < 24 ? PAL.negative : PAL.hudText);
  drawText(ctx, rwStr, bx + 250, ly, rwCol, 1);
  ly += lh;

  drawText(ctx, 'PRODUCT QUALITY:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, '' + gs.product, bx + 250, ly, PAL.positive, 1);
  ly += lh;

  drawText(ctx, 'BUGS:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, '' + gs.bugs, bx + 250, ly, gs.bugs > 5 ? PAL.negative : (gs.bugs > 0 ? PAL.textAccent : PAL.positive), 1);
  ly += lh;

  if (gs.gameOver) {
    ly += 10;
    var goStr = 'RUNWAY EXHAUSTED';
    var goW = measureText(goStr, 2);
    drawText(ctx, goStr, bx + Math.floor((boxW - goW.width) / 2), ly, PAL.negative, 2);
    ly += 24;
    var restartStr = 'PRESS ENTER TO RESTART';
    var rw = measureText(restartStr, 1);
    drawText(ctx, restartStr, bx + Math.floor((boxW - rw.width) / 2), ly, PAL.textSecondary, 1);
  } else {
    var contStr = 'PRESS ENTER/SPACE FOR NEXT DAY';
    var cw = measureText(contStr, 1);
    drawText(ctx, contStr, bx + Math.floor((boxW - cw.width) / 2), by + boxH - 20, PAL.textSecondary, 1);
  }
}

function drawGameOver(ctx) {

  ctx.fillRect(0, 0, 640, 360);

  var title = 'GAME OVER';
  var tw = measureText(title, 4);
  drawText(ctx, title, Math.floor((640 - tw.width) / 2), 80, PAL.negative, 4);

  var sub = 'RUNWAY EXHAUSTED';
  var sw = measureText(sub, 2);
  drawText(ctx, sub, Math.floor((640 - sw.width) / 2), 130, PAL.textAccent, 2);

  var stats = [
    'Survived ' + gs.day + ' days (' + gs.day + ' weeks)',
    'Peak MRR: ' + formatCash(gs.mrr),
    'Final customers: ' + gs.customers,
    'Product quality: ' + gs.product,
    'Bugs at end: ' + gs.bugs
  ];

  for (var i = 0; i < stats.length; i++) {
    var sW = measureText(stats[i], 1);
    drawText(ctx, stats[i], Math.floor((640 - sW.width) / 2), 180 + i * 18, PAL.textSecondary, 1);
  }

  if (Math.floor(Date.now() / 500) % 2 === 0) {
    var restart = 'PRESS ENTER TO TRY AGAIN';
    var rw = measureText(restart, 2);
    drawText(ctx, restart, Math.floor((640 - rw.width) / 2), 290, PAL.textPrimary, 2);
  }
}

// --- Input Handling ---
function handleInput(e) {
  var key = e.code;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Tab','Enter','KeyE'].indexOf(key) !== -1) e.preventDefault();

  var gs = gameState;

  if (gs.gameOver && gs.uiState === 'game_over') {
    if (key === 'Enter' || key === 'Space') location.reload();
    return;
  }

  switch (gs.uiState) {
    case 'inbox': handleInboxInput(key); break;
    case 'action_menu': handleActionMenuInput(key); break;
    case 'action_result': handleActionResultInput(key); break;
    case 'evening_summary': handleEveningSummaryInput(key); break;
  }
}

function handleInboxInput(key) {
  var gs = gameState;
  var inbox = gs.inbox;
  if (key === 'ArrowUp' || key === 'KeyW') {
    gs.selectedIndex = Math.max(0, gs.selectedIndex - 1);
  } else if (key === 'ArrowDown' || key === 'KeyS') {
    gs.selectedIndex = Math.min(inbox.length - 1, gs.selectedIndex + 1);
  } else if (key === 'Enter' || key === 'Space') {
    // Mark selected email as read
    if (gs.selectedIndex >= 0 && gs.selectedIndex < inbox.length) {
      markEmailRead(gs.selectedIndex);
    }
  } else if (key === 'KeyE') {
    // Advance to afternoon only if all read
    if (allEmailsRead()) {
      advancePhase();
    }
  }
}

function handleActionMenuInput(key) {
  var gs = gameState;
  var actions = ENGINE.actions;
  if (key === 'ArrowUp' || key === 'KeyW') {
    gs.selectedIndex = Math.max(0, gs.selectedIndex - 1);
  } else if (key === 'ArrowDown' || key === 'KeyS') {
    gs.selectedIndex = Math.min(actions.length - 1, gs.selectedIndex + 1);
  } else if (key === 'Enter' || key === 'Space') {
    var action = actions[gs.selectedIndex];
    if (!action) return;

    var affordable = action.cost === 0 || gs.ap >= action.cost;
    var enabled = action.enabled(gs) && affordable;
    if (!enabled) return;

    var result = performAction(action.id);
    if (result.success) {
      gs.actionResult = result;
      gs.uiState = 'action_result';
    }
  }
}

function handleActionResultInput(key) {
  var gs = gameState;
  if (key === 'Space' || key === 'Enter') {
    gs.actionResult = null;
    if (gs.ap <= 0) {
      advancePhase();
    } else {
      gs.uiState = 'action_menu';
      gs.selectedIndex = 0;
    }
  }
}

function handleEveningSummaryInput(key) {
  var gs = gameState;
  if (key === 'Enter' || key === 'Space') {
    if (gs.gameOver) {
      gs.uiState = 'game_over';
    } else {
      advancePhase();
    }
  }
}

window.addEventListener('keydown', handleInput);

// --- Game Loop ---
var lastTime = 0;

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  lastTime = timestamp;

  var gs = gameState;

  // Clear
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);

  // Draw based on UI state
  switch (gs.uiState) {
    case 'inbox':
      drawInbox(ctx);
      break;
    case 'action_menu':
      drawActionMenu(ctx);
      break;
    case 'action_result':
      drawActionResult(ctx);
      break;
    case 'evening_summary':
      drawEveningSummary(ctx);
      break;
    case 'game_over':
      drawGameOver(ctx);
      break;
  }

  requestAnimationFrame(gameLoop);
}

// --- Boot ---
initCanvas();
initDay();
requestAnimationFrame(gameLoop);
</script>
