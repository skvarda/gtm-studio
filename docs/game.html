function drawText(ctx, text, x, y, color, scale) {
  if (scale === undefined) scale = 1;
  ctx.fillStyle = color;
  let cx = x;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], glyph = FONT_DATA[ch];
    if (ch === ' ') { cx += 4 * scale; continue; }
    if (!glyph) { cx += (FONT_W + 1) * scale; continue; }
    for (let r = 0; r < FONT_H; r++)
      for (let c = 0; c < FONT_W; c++)
        if (glyph[r * FONT_W + c]) ctx.fillRect(cx + c * scale, y + r * scale, scale, scale);
    cx += (FONT_W + 1) * scale;
  }
}

function measureText(text, scale) {
  if (scale === undefined) scale = 1;
  let w = 0;
  for (let i = 0; i < text.length; i++) w += (text[i] === ' ') ? 4 * scale : (FONT_W + 1) * scale;
  if (text.length > 0) w -= 1 * scale;
  return { width: w, height: FONT_H * scale };
}

function wrapText(text, maxWidth, scale) {
  const words = text.split(' '), lines = [];
  let cur = '';
  for (let i = 0; i < words.length; i++) {
    const w = words[i];
    const test = cur ? cur + ' ' + w : w;
    if (measureText(test, scale).width > maxWidth) {
      if (cur) lines.push(cur);
      cur = w;
    } else cur = test;
  }
  if (cur) lines.push(cur);
  return lines;
}

// --- Economy Tick ---
function economyTick(gs) {
  const avgRevenue = 99;
  const newMRR = gs.customers * avgRevenue;
  gs.mrr = newMRR;

  let employeeSalaries = 0;
  for (let i = 0; i < gs.employees.length; i++) employeeSalaries += gs.employees[i].salary;
  const baseBurn = 2000;
  gs.monthlyBurn = employeeSalaries + baseBurn * 4;
  const weeklyBurn = Math.floor(gs.monthlyBurn / 4);

  const revenue = Math.floor(newMRR / 4);
  gs.cash += revenue;
  gs.cash -= weeklyBurn;

  let churnedCustomers = 0;
  let remaining = gs.customers;
  for (let i = 0; i < remaining; i++) {
    if (Math.random() < 0.03) churnedCustomers++;
  }
  gs.customers = Math.max(0, gs.customers - churnedCustomers);
  gs.mrr = gs.customers * avgRevenue;

  const newRunway = weeklyBurn > revenue ? Math.floor(gs.cash / (weeklyBurn - revenue)) : 999;

  if (gs.product > 0 && Math.random() < 0.3) {
    gs.bugs += Math.floor(Math.random() * 2) + 1;
  }

  return {
    revenue: revenue,
    burn: weeklyBurn,
    churnedCustomers: churnedCustomers,
    newRunway: newRunway,
    netChange: revenue - weeklyBurn
  };
}

// --- Day Cycle ---

  gs.phase = 'morning';
  resetAP(gs);
  gs.inbox = generateEmails(gs);
  gs.uiState = 'inbox';
  gs.selectedIndex = 0;
  gs.actionResult = null;
  gs.eveningSummary = null;
}

function advancePhase(gs) {
  if (gs.phase === 'morning') {
    gs.phase = 'afternoon';
    gs.uiState = 'action_menu';
    gs.selectedIndex = 0;
    return 'afternoon';
  } else if (gs.phase === 'afternoon') {
    gs.phase = 'evening';
    gs.eveningSummary = economyTick(gs);
    gs.uiState = 'evening_summary';
    if (gs.cash <= 0) gs.gameOver = true;
    return 'evening';
  } else if (gs.phase === 'evening') {
    advanceDay(gs);
    return 'morning';
  }
}

function advanceDay(gs) {
  gs.day++;
  if (gs.day <= 10) gs.era = 'garage';
  else if (gs.day <= 30) gs.era = 'early';
  else if (gs.day <= 60) gs.era = 'growth';
  else gs.era = 'scale';
  initDay(gs);
}

  const eligible = EMAIL_POOL.filter(function(tmpl) {
    if (tmpl.day && tmpl.day !== gs.day) return false;
    if (tmpl.day && tmpl.day === gs.day) return true;
    if (tmpl.minDay && gs.day < tmpl.minDay) return false;
    if (tmpl.maxDay && gs.day > tmpl.maxDay) return false;
    if (tmpl.unique && gs.emailsSent.indexOf(tmpl.id) !== -1) return false;
    return true;
  });

  // Mandatory emails (exact day match)
  const mandatory = eligible.filter(function(e) { return e.day === gs.day; });
  for (let i = 0; i < mandatory.length; i++) {
    emails.push(makeEmail(mandatory[i], gs));
  }

  // Random from pool
  const pool = eligible.filter(function(e) { return !e.day; });
  const shuffled = pool.sort(function() { return Math.random() - 0.5; });
  const needed = Math.max(0, (2 + Math.floor(Math.random() * 3)) - emails.length);
  for (let i = 0; i < Math.min(needed, shuffled.length); i++) {
    emails.push(makeEmail(shuffled[i], gs));
  }

  // Ensure at least 1 email
  if (emails.length === 0) {
    emails.push({
      id: 'fallback_' + gs.day,
      from: 'Jordan',
      subject: 'Day ' + gs.day,
      body: 'Another day, another chance to not go bankrupt. Get to work.',
      day: gs.day,
      choices: null,
      read: false
    });
  }

  return emails;
}

function makeEmail(tmpl, gs) {
  if (tmpl.unique) gs.emailsSent.push(tmpl.id);
  return {
    id: tmpl.id,
    from: tmpl.from,
    subject: tmpl.subject,
    body: tmpl.body,
    day: gs.day,
    choices: tmpl.choices || null,
    read: false
  };
}

// --- Drawing Functions ---

function drawHUD(ctx, gs) {
  // Background bar
  ctx.fillStyle = PAL.hudBg;
  ctx.fillRect(0, 0, 640, 24);
  ctx.fillStyle = '#2a2a3e';
  ctx.fillRect(0, 24, 640, 1);

  // Day
  drawText(ctx, 'DAY ' + gs.day, 6, 4, PAL.hudText, 1);

  // Phase indicator
  const phaseStr = gs.phase.toUpperCase();
  drawText(ctx, phaseStr, 6, 14, PAL.textSecondary, 1);

  // Cash with commas
  drawText(ctx, formatCash(gs.cash), 100, 4, PAL.textAccent, 1);

  // MRR
  drawText(ctx, 'MRR ' + formatCash(gs.mrr), 230, 4, PAL.positive, 1);

  // Runway
  const weeklyBurn = Math.floor(gs.monthlyBurn / 4);
  const weeklyRev = Math.floor(gs.mrr / 4);
  let runwayStr;
  if (weeklyBurn <= weeklyRev) {
    runwayStr = 'RWY ~';
  } else if (gs.cash <= 0) {
    runwayStr = 'RWY 0mo';
  } else {
    const rwWeeks = Math.floor(gs.cash / (weeklyBurn - weeklyRev));
    const rwMonths = Math.floor(rwWeeks / 4);
    runwayStr = 'RWY ' + rwMonths + 'mo';
  }
  const rwColor = runwayStr === 'RWY ~' ? PAL.positive : (parseInt(runwayStr.replace(/\D/g,'')) < 6 ? PAL.negative : PAL.hudText);
  drawText(ctx, runwayStr, 370, 4, rwColor, 1);

  // AP pips
  drawText(ctx, 'AP', 480, 4, PAL.hudText, 1);
  for (let i = 0; i < gs.maxAP; i++) {
    const px = 504 + i * 14;
    const py = 7;
    const filled = i < gs.ap;
    ctx.fillStyle = filled ? PAL.apFull : PAL.apEmpty;
    // Diamond shape
    ctx.beginPath();
    ctx.moveTo(px, py - 5);
    ctx.lineTo(px + 5, py);
    ctx.lineTo(px, py + 5);
    ctx.lineTo(px - 5, py);
    ctx.closePath();
    ctx.fill();
  }

  // Era
  drawText(ctx, gs.era.toUpperCase(), 600, 14, PAL.textSecondary, 1);
}

function drawInbox(ctx, gs) {
  const inbox = gs.inbox;
  const sel = gs.selectedIndex;

  // Full screen overlay
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);

  // Header
  ctx.fillStyle = PAL.hudBg;
  ctx.fillRect(0, 0, 640, 30);
  drawText(ctx, 'INBOX - DAY ' + gs.day + ' MORNING', 10, 8, PAL.textAccent, 2);

  const unreadCount = inbox.filter(function(e) { return !e.read; }).length;
  if (unreadCount > 0) {
    drawText(ctx, unreadCount + ' UNREAD', 520, 12, PAL.emailUnread, 1);
  } else {
    drawText(ctx, 'ALL READ', 530, 12, PAL.positive, 1);
  }

  // Left panel: email list
  const listW = 220;
  ctx.fillStyle = PAL.emailBg;
  ctx.fillRect(0, 30, listW, 330);

  for (let i = 0; i < inbox.length; i++) {
    const email = inbox[i];
    const ey = 34 + i * 40;

    if (i === sel) {
      ctx.fillStyle = PAL.emailSelected;
      ctx.fillRect(0, ey, listW, 38);
    }

    // Unread dot
    if (!email.read) {
      ctx.fillStyle = PAL.emailUnread;
      ctx.beginPath();
      ctx.arc(10, ey + 12, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // From
    drawText(ctx, email.from, 18, ey + 4, email.read ? PAL.emailRead : PAL.textPrimary, 1);
    // Subject (truncated)
    const maxSubjW = listW - 24;
    let subj = email.subject;
    while (measureText(subj, 1).width > maxSubjW && subj.length > 3) {
      subj = subj.slice(0, -1);
    }
    drawText(ctx, subj, 18, ey + 16, email.read ? PAL.emailRead : PAL.textSecondary, 1);

    // Separator
    ctx.fillStyle = '#1a2a4e';
    ctx.fillRect(10, ey + 38, listW - 20, 1);
  }

  // Right panel: email detail
  ctx.fillStyle = '#111122';
  ctx.fillRect(listW, 30, 640 - listW, 330);

  if (sel >= 0 && sel < inbox.length) {
    const email = inbox[sel];
    const rx = listW + 16;

    drawText(ctx, email.subject, rx, 44, PAL.textAccent, 2);
    drawText(ctx, 'FROM: ' + email.from, rx, 68, PAL.textSecondary, 1);

    ctx.fillStyle = '#222244';
    ctx.fillRect(rx, 82, 640 - listW - 32, 1);

    const bodyLines = wrapText(email.body, 640 - listW - 40, 1);
    for (let i = 0; i < bodyLines.length; i++) {
      drawText(ctx, bodyLines[i], rx, 92 + i * 14, PAL.textPrimary, 1);
    }
  }

  // Bottom instructions
  ctx.fillStyle = PAL.hudBg;
  ctx.fillRect(0, 336, 640, 24);

  drawText(ctx, 'UP/DOWN: Navigate', 10, 342, PAL.textSecondary, 1);
  drawText(ctx, 'ENTER: Read', 200, 342, PAL.textSecondary, 1);

  if (unreadCount === 0) {
    drawText(ctx, 'SPACE: Start Day', 380, 342, PAL.positive, 1);
  } else {
    drawText(ctx, 'Read all emails to continue', 380, 342, PAL.emailUnread, 1);
  }
}

function drawActionMenu(ctx, gs) {
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);

  // Header
  drawHUD(ctx, gs);

  // Title
  drawText(ctx, 'AFTERNOON - CHOOSE AN ACTION', 10, 32, PAL.textAccent, 2);

  // Action list
  const actions = ENGINE.actions;
  const sel = gs.selectedIndex;

  for (let i = 0; i < actions.length; i++) {
    const action = actions[i];
    const ay = 58 + i * 38;
    const isSelected = i === sel;
    const affordable = action.cost === 0 || canAfford(gs, action.cost);
    const enabled = action.enabled(gs) && affordable;

    // Selection highlight
    if (isSelected) {
      ctx.fillStyle = PAL.buttonHover;
      ctx.fillRect(10, ay, 620, 36);
    } else {
      ctx.fillStyle = PAL.buttonBg;
      ctx.fillRect(10, ay, 620, 36);
    }

    // Cursor
    if (isSelected) {
      drawText(ctx, '>', 16, ay + 6, PAL.textAccent, 2);
    }

    // Label
    const labelColor = enabled ? (isSelected ? PAL.textAccent : PAL.textPrimary) : PAL.apEmpty;
    drawText(ctx, action.label, 40, ay + 4, labelColor, 2);

    // AP cost
    if (action.cost > 0) {
      const costStr = action.cost + ' AP';
      const costColor = affordable ? PAL.apFull : PAL.negative;
      drawText(ctx, costStr, 560, ay + 8, costColor, 1);
    } else {
      drawText(ctx, 'FREE', 560, ay + 8, PAL.positive, 1);
    }

    // Description line for selected
    if (isSelected) {
      let desc = '';
      if (action.id === 'code_feature') desc = 'Spend time coding. Improves product quality.';
      else if (action.id === 'fix_bugs') desc = 'Fix bugs in the codebase. (' + gs.bugs + ' bugs)';
      else if (action.id === 'sales_call') desc = 'Call a prospect. Good chance to close a deal.';
      else if (action.id === 'cold_email') desc = 'Blast out cold emails. Low chance, low cost.';
      else if (action.id === 'post_on_hn') desc = 'Post on Hacker News. Random outcome.';
      else if (action.id === 'nap') desc = 'Sometimes you just need to rest.';
      else if (action.id === 'end_day') desc = 'Skip remaining AP and end the day.';
      drawText(ctx, desc, 40, ay + 22, PAL.textSecondary, 1);
    }

    if (!enabled && isSelected) {
      if (!action.enabled(gs)) drawText(ctx, 'Not available', 400, ay + 22, PAL.negative, 1);
      else drawText(ctx, 'Not enough AP', 400, ay + 22, PAL.negative, 1);
    }
  }

  // Bottom bar
  ctx.fillStyle = PAL.hudBg;
  ctx.fillRect(0, 336, 640, 24);
  drawText(ctx, 'UP/DOWN: Navigate   ENTER: Select', 10, 342, PAL.textSecondary, 1);
  drawText(ctx, 'AP: ' + gs.ap + '/' + gs.maxAP, 540, 342, PAL.apFull, 1);
}

function drawActionResult(ctx, gs) {
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);
  drawHUD(ctx, gs);

  const result = gs.actionResult;
  if (!result) return;

  // Result box
  const boxW = 500, boxH = 180;
  const bx = Math.floor((640 - boxW) / 2);
  const by = Math.floor((360 - boxH) / 2);

  ctx.fillStyle = PAL.emailBg;
  ctx.fillRect(bx, by, boxW, boxH);
  ctx.strokeStyle = PAL.textAccent;
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, boxW, boxH);

  drawText(ctx, 'RESULT', bx + 10, by + 10, PAL.textAccent, 2);

  const lines = wrapText(result.text, boxW - 30, 1);
  for (let i = 0; i < lines.length; i++) {
    drawText(ctx, lines[i], bx + 14, by + 40 + i * 14, PAL.textPrimary, 1);
  }

  // Show effects
  let ey = by + 40 + lines.length * 14 + 14;
  if (result.effects) {
    if (result.effects.customers) drawText(ctx, '+' + result.effects.customers + ' CUSTOMERS', bx + 14, ey, PAL.positive, 1);
    if (result.effects.product) drawText(ctx, '+' + result.effects.product + ' PRODUCT', bx + 200, ey, PAL.positive, 1);
  }

  // Continue prompt
  const apLeft = gs.ap;
  if (apLeft > 0) {
    drawText(ctx, 'SPACE: Continue (' + apLeft + ' AP left)', bx + 10, by + boxH - 20, PAL.textSecondary, 1);
  } else {
    drawText(ctx, 'SPACE: End Day (0 AP left)', bx + 10, by + boxH - 20, PAL.textSecondary, 1);
  }
}

function drawEveningSummary(ctx, gs) {
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);

  const summary = gs.eveningSummary;
  if (!summary) return;

  const boxW = 440, boxH = 280;
  const bx = Math.floor((640 - boxW) / 2);
  const by = Math.floor((360 - boxH) / 2);

  ctx.fillStyle = PAL.emailBg;
  ctx.fillRect(bx, by, boxW, boxH);
  ctx.strokeStyle = PAL.apFull;
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, boxW, boxH);

  drawText(ctx, 'EVENING REPORT - DAY ' + gs.day, bx + 10, by + 10, PAL.textAccent, 2);

  let ly = by + 40;
  const lh = 18;

  drawText(ctx, 'REVENUE THIS WEEK:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, formatCash(summary.revenue), bx + 250, ly, PAL.positive, 1);
  ly += lh;

  drawText(ctx, 'BURN THIS WEEK:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, formatCash(summary.burn), bx + 250, ly, PAL.negative, 1);
  ly += lh;

  const net = summary.netChange;
  drawText(ctx, 'NET CHANGE:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, (net >= 0 ? '+' : '') + formatCash(net), bx + 250, ly, net >= 0 ? PAL.positive : PAL.negative, 1);
  ly += lh + 6;

  ctx.fillStyle = '#222244';
  ctx.fillRect(bx + 20, ly, boxW - 40, 1);
  ly += 10;

  drawText(ctx, 'CUSTOMERS:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, '' + gs.customers, bx + 250, ly, PAL.textPrimary, 1);
  ly += lh;

  if (summary.churnedCustomers > 0) {
    drawText(ctx, 'CHURNED:', bx + 20, ly, PAL.textSecondary, 1);
    drawText(ctx, '-' + summary.churnedCustomers, bx + 250, ly, PAL.negative, 1);
    ly += lh;
  }

  drawText(ctx, 'MRR:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, formatCash(gs.mrr), bx + 250, ly, PAL.positive, 1);
  ly += lh;

  drawText(ctx, 'CASH:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, formatCash(gs.cash), bx + 250, ly, gs.cash > 0 ? PAL.textAccent : PAL.negative, 1);
  ly += lh;

  drawText(ctx, 'PRODUCT QUALITY:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, '' + gs.product, bx + 250, ly, PAL.positive, 1);
  ly += lh;

  drawText(ctx, 'BUGS:', bx + 20, ly, PAL.textSecondary, 1);
  drawText(ctx, '' + gs.bugs, bx + 250, ly, gs.bugs > 0 ? PAL.negative : PAL.positive, 1);
  ly += lh;

  if (gs.gameOver) {
    ly += 10;
    const goStr = 'RUNWAY EXHAUSTED';
    const goW = measureText(goStr, 2);
    drawText(ctx, goStr, bx + Math.floor((boxW - goW.width) / 2), ly, PAL.negative, 2);
    ly += 24;
    const restartStr = 'PRESS ENTER TO RESTART';
    const rw = measureText(restartStr, 1);
    drawText(ctx, restartStr, bx + Math.floor((boxW - rw.width) / 2), ly, PAL.textSecondary, 1);
  } else {
    const contStr = 'PRESS ENTER/SPACE FOR NEXT DAY';
    const cw = measureText(contStr, 1);
    drawText(ctx, contStr, bx + Math.floor((boxW - cw.width) / 2), by + boxH - 20, PAL.textSecondary, 1);
  }
}

function drawGameOver(ctx, gs) {
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);

  const title = 'GAME OVER';
  const tw = measureText(title, 4);
  drawText(ctx, title, Math.floor((640 - tw.width) / 2), 80, PAL.negative, 4);

  const sub = 'RUNWAY EXHAUSTED';
  const sw = measureText(sub, 2);
  drawText(ctx, sub, Math.floor((640 - sw.width) / 2), 130, PAL.textAccent, 2);

  const stats = [
    'Survived ' + gs.day + ' days',
    'Peak MRR: ' + formatCash(gs.mrr),
    'Final customers: ' + gs.customers,
    'Product quality: ' + gs.product
  ];

  for (let i = 0; i < stats.length; i++) {
    const sW = measureText(stats[i], 1);
    drawText(ctx, stats[i], Math.floor((640 - sW.width) / 2), 180 + i * 18, PAL.textSecondary, 1);
  }

  if (Math.floor(Date.now() / 500) % 2 === 0) {
    const restart = 'PRESS ENTER TO TRY AGAIN';
    const rw = measureText(restart, 2);
    drawText(ctx, restart, Math.floor((640 - rw.width) / 2), 280, PAL.textPrimary, 2);
  }
}

// --- Input Handling ---
function handleInput(e) {
  const key = e.code;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Tab','Enter'].indexOf(key) !== -1) e.preventDefault();

  if (gs.gameOver && gs.uiState === 'game_over') {
    if (key === 'Enter' || key === 'Space') location.reload();
    return;
  }

  switch (gs.uiState) {
    case 'inbox': handleInboxInput(key); break;
    case 'action_menu': handleActionMenuInput(key); break;
    case 'action_result': handleActionResultInput(key); break;
    case 'evening_summary': handleEveningSummaryInput(key); break;
  }
}

function handleInboxInput(key) {
  const inbox = gs.inbox;
  if (key === 'ArrowUp' || key === 'KeyW') {
    gs.selectedIndex = Math.max(0, gs.selectedIndex - 1);
  } else if (key === 'ArrowDown' || key === 'KeyS') {
    gs.selectedIndex = Math.min(inbox.length - 1, gs.selectedIndex + 1);
  } else if (key === 'Enter') {
    if (gs.selectedIndex >= 0 && gs.selectedIndex < inbox.length) {
      inbox[gs.selectedIndex].read = true;
    }
  } else if (key === 'Space') {
    const unread = inbox.filter(function(e) { return !e.read; }).length;
    if (unread === 0) {
      advancePhase(gs);
    }
  }
}

function handleActionMenuInput(key) {
  const actions = ENGINE.actions;
  if (key === 'ArrowUp' || key === 'KeyW') {
    gs.selectedIndex = Math.max(0, gs.selectedIndex - 1);
  } else if (key === 'ArrowDown' || key === 'KeyS') {
    gs.selectedIndex = Math.min(actions.length - 1, gs.selectedIndex + 1);
  } else if (key === 'Enter' || key === 'Space') {
    const action = actions[gs.selectedIndex];
    if (!action) return;

    const affordable = action.cost === 0 || canAfford(gs, action.cost);
    const enabled = action.enabled(gs) && affordable;
    if (!enabled) return;

    if (action.cost > 0) spendAP(gs, action.cost);
    const result = action.execute(gs);
    gs.actionResult = result;
    gs.uiState = 'action_result';
  }
}

function handleActionResultInput(key) {
  if (key === 'Space' || key === 'Enter') {
    gs.actionResult = null;
    if (gs.ap <= 0) {
      advancePhase(gs);
    } else {
      gs.uiState = 'action_menu';
      gs.selectedIndex = 0;
    }
  }
}

function handleEveningSummaryInput(key) {
  if (key === 'Enter' || key === 'Space') {
    if (gs.gameOver) {
      gs.uiState = 'game_over';
    } else {
      advancePhase(gs);
    }
  }
}

window.addEventListener('keydown', handleInput);

// --- Game Loop ---
const gs = gameState;
let lastTime = 0;

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  lastTime = timestamp;

  // Clear
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);

  // Draw based on UI state
  switch (gs.uiState) {
    case 'inbox':
      drawInbox(ctx, gs);
      break;
    case 'action_menu':
      drawActionMenu(ctx, gs);
      break;
    case 'action_result':
      drawActionResult(ctx, gs);
      break;
    case 'evening_summary':
      drawEveningSummary(ctx, gs);
      break;
    case 'game_over':
      drawGameOver(ctx, gs);
      break;
  }

  requestAnimationFrame(gameLoop);
}

// --- Boot ---
initCanvas();
initDay(gs);
requestAnimationFrame(gameLoop);
</script>
