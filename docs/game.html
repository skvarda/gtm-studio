function drawText(ctx, text, x, y, color, scale) {
  if (scale === undefined) scale = 1;
  ctx.fillStyle = color;
  let cx = x;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const glyph = FONT_DATA[ch];
    if (ch === ' ') {
      cx += 4 * scale;
      continue;
    }
    if (!glyph) {
      cx += (FONT_W + 1) * scale;
      continue;
    }
    for (let r = 0; r < FONT_H; r++) {
      for (let c = 0; c < FONT_W; c++) {
        if (glyph[r * FONT_W + c]) {
          ctx.fillRect(cx + c * scale, y + r * scale, scale, scale);
        }
      }
    }
    cx += (FONT_W + 1) * scale;
  }
}

function measureText(text, scale) {
  if (scale === undefined) scale = 1;
  let w = 0;
  for (let i = 0; i < text.length; i++) {
    if (text[i] === ' ') {
      w += 4 * scale;
    } else {
      w += (FONT_W + 1) * scale;
    }
  }
  if (text.length > 0) w -= 1 * scale; // remove trailing spacing
  return { width: w, height: FONT_H * scale };
}

// --- Canvas Rendering ---
let canvas, ctx;

function initCanvas() {
  canvas = document.createElement('canvas');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 640 * dpr;
  canvas.height = 360 * dpr;
  canvas.style.width = '1280px';
  canvas.style.height = '720px';
  document.body.appendChild(canvas);
  ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.scale(dpr, dpr);
}

// --- Rooms ---
const TILE = 32;
const GRID_W = 20;
const GRID_H = 11;
const HUD_H = 32;

const ROOMS = {
  apartment: {
    name: 'Apartment',
    // 0=floor, 1=wall, 2=desk/laptop, 3=bed, 4=rug, 5=whiteboard, 6=door, 7=jordan
    tiles: (function() {
      const t = [];
      for (let y = 0; y < GRID_H; y++) {
        t[y] = [];
        for (let x = 0; x < GRID_W; x++) {
          if (y < 2) t[y][x] = 1; // wall
          else t[y][x] = 0; // floor
        }
      }
      // Furniture
      t[3][3] = 2; // desk with laptop
      t[2][14] = 3; t[2][15] = 3; t[3][14] = 3; t[3][15] = 3; // bed
      t[1][6] = 5; // whiteboard on wall
      t[9][10] = 6; // door
      // Jordan
      t[5][8] = 7;
      // Rug
      for (let ry = 6; ry <= 8; ry++) {
        for (let rx = 8; rx <= 11; rx++) {
          t[ry][rx] = 4;
        }
      }
      return t;
    })(),
    collisions: (function() {
      const c = new Set();
      // Walls
      for (let x = 0; x < GRID_W; x++) {
        c.add('0,' + x); c.add('1,' + x);
      }
      // Desk
      c.add('3,3');
      // Bed
      c.add('2,14'); c.add('2,15'); c.add('3,14'); c.add('3,15');
      // Jordan
      c.add('5,8');
      return c;
    })(),
    playerSpawn: { x: 5, y: 6 },
    jordan: { x: 8, y: 5 },
    laptop: { x: 3, y: 3 },
    door: { x: 10, y: 9 }
  }
};

function isCollision(tx, ty) {
  if (tx < 0 || tx >= GRID_W || ty < 2 || ty >= GRID_H) return true;
  const room = ROOMS[gameState.currentRoom];
  return room.collisions.has(ty + ',' + tx);
}

// --- Drawing: Room ---
function drawRoom(ctx) {
  const room = ROOMS[gameState.currentRoom];
  for (let y = 0; y < GRID_H; y++) {
    for (let x = 0; x < GRID_W; x++) {
      const px = x * TILE;
      const py = y * TILE + HUD_H;
      const tile = room.tiles[y][x];

      if (tile === 1) {
        // Wall
        ctx.fillStyle = PAL.wall;
        ctx.fillRect(px, py, TILE, TILE);
        // Slight variation for texture
        ctx.fillStyle = PAL.wallLight;
        ctx.fillRect(px + 2, py + 2, 4, 4);
      } else if (tile === 0 || tile === 7) {
        // Floor
        ctx.fillStyle = ((x + y) % 2 === 0) ? PAL.wood : PAL.woodDark;
        ctx.fillRect(px, py, TILE, TILE);
      } else if (tile === 4) {
        // Rug
        ctx.fillStyle = PAL.rug;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = '#B07050';
        ctx.fillRect(px + 1, py + 1, TILE - 2, TILE - 2);
      } else if (tile === 2) {
        // Desk with laptop
        ctx.fillStyle = ((x + y) % 2 === 0) ? PAL.wood : PAL.woodDark;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = PAL.desk;
        ctx.fillRect(px + 2, py + 4, 28, 24);
        ctx.fillStyle = PAL.laptop;
        ctx.fillRect(px + 6, py + 6, 18, 14);
        ctx.fillStyle = '#80C0E0';
        ctx.fillRect(px + 8, py + 8, 14, 10);
      } else if (tile === 3) {
        // Bed
        ctx.fillStyle = ((x + y) % 2 === 0) ? PAL.wood : PAL.woodDark;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = PAL.bed;
        ctx.fillRect(px + 1, py + 1, TILE - 2, TILE - 2);
        ctx.fillStyle = '#5070B0';
        ctx.fillRect(px + 3, py + 3, TILE - 6, TILE - 6);
      } else if (tile === 5) {
        // Whiteboard
        ctx.fillStyle = PAL.wall;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = PAL.white;
        ctx.fillRect(px + 4, py + 4, 24, 20);
        ctx.fillStyle = '#E0E0E0';
        ctx.fillRect(px + 6, py + 8, 20, 2);
        ctx.fillRect(px + 6, py + 14, 16, 2);
      } else if (tile === 6) {
        // Door
        ctx.fillStyle = ((x + y) % 2 === 0) ? PAL.wood : PAL.woodDark;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = PAL.door;
        ctx.fillRect(px + 4, py, 24, TILE);
        ctx.fillStyle = PAL.gold;
        ctx.fillRect(px + 22, py + 14, 4, 4);
      }
    }
  }
}

// --- Drawing: Player Sprite ---
function drawPlayer(ctx, x, y, facing) {
  // 16x28 character, centered in tile
  const ox = x + 8;
  const oy = y + 2;

  // Body (hoodie)
  ctx.fillStyle = PAL.hoodie;
  ctx.fillRect(ox, oy + 10, 16, 14);

  // Jeans
  ctx.fillStyle = PAL.jeans;
  ctx.fillRect(ox + 2, oy + 24, 5, 4);
  ctx.fillRect(ox + 9, oy + 24, 5, 4);

  // Head
  ctx.fillStyle = PAL.skin;
  ctx.fillRect(ox + 3, oy + 2, 10, 8);

  // Hair
  ctx.fillStyle = PAL.hair;

  if (facing === 'down' || facing === 'left' || facing === 'right') {
    ctx.fillRect(ox + 3, oy, 10, 4);
  }
  if (facing === 'up') {
    ctx.fillRect(ox + 3, oy, 10, 6);
  }

  // Face details
  if (facing === 'down') {
    // Eyes
    ctx.fillStyle = PAL.black;
    ctx.fillRect(ox + 5, oy + 5, 2, 2);
    ctx.fillRect(ox + 9, oy + 5, 2, 2);
    // Mouth
    ctx.fillRect(ox + 7, oy + 8, 2, 1);
  } else if (facing === 'left') {
    ctx.fillStyle = PAL.black;
    ctx.fillRect(ox + 4, oy + 5, 2, 2);
    ctx.fillRect(ox + 6, oy + 8, 2, 1);
    ctx.fillStyle = PAL.hair;
    ctx.fillRect(ox + 10, oy + 2, 3, 6);
  } else if (facing === 'right') {
    ctx.fillStyle = PAL.black;
    ctx.fillRect(ox + 10, oy + 5, 2, 2);
    ctx.fillRect(ox + 8, oy + 8, 2, 1);
    ctx.fillStyle = PAL.hair;
    ctx.fillRect(ox + 3, oy + 2, 3, 6);
  }
  // up = back of head, no face details

  // Arms
  ctx.fillStyle = PAL.hoodie;
  ctx.fillRect(ox - 2, oy + 12, 4, 10);
  ctx.fillRect(ox + 14, oy + 12, 4, 10);

  // Hands
  ctx.fillStyle = PAL.skin;
  ctx.fillRect(ox - 1, oy + 22, 3, 2);
  ctx.fillRect(ox + 14, oy + 22, 3, 2);
}

function drawJordan(ctx, x, y) {
  const ox = x + 8;
  const oy = y + 2;

  // Body
  ctx.fillStyle = PAL.jordanHoodie;
  ctx.fillRect(ox, oy + 10, 16, 14);

  // Jeans
  ctx.fillStyle = PAL.jeans;
  ctx.fillRect(ox + 2, oy + 24, 5, 4);
  ctx.fillRect(ox + 9, oy + 24, 5, 4);

  // Head
  ctx.fillStyle = PAL.skin;
  ctx.fillRect(ox + 3, oy + 2, 10, 8);

  // Messy hair
  ctx.fillStyle = PAL.hair;
  ctx.fillRect(ox + 2, oy, 12, 4);
  ctx.fillRect(ox + 1, oy + 1, 2, 3);
  ctx.fillRect(ox + 13, oy + 1, 2, 3);

  // Glasses
  ctx.fillStyle = '#A0A0B0';
  ctx.fillRect(ox + 4, oy + 4, 3, 3);
  ctx.fillRect(ox + 9, oy + 4, 3, 3);
  ctx.fillRect(ox + 7, oy + 5, 2, 1);

  // Eyes behind glasses
  ctx.fillStyle = PAL.black;
  ctx.fillRect(ox + 5, oy + 5, 1, 1);
  ctx.fillRect(ox + 10, oy + 5, 1, 1);

  // Arms
  ctx.fillStyle = PAL.jordanHoodie;
  ctx.fillRect(ox - 2, oy + 12, 4, 10);
  ctx.fillRect(ox + 14, oy + 12, 4, 10);

  // Hands
  ctx.fillStyle = PAL.skin;
  ctx.fillRect(ox - 1, oy + 22, 3, 2);
  ctx.fillRect(ox + 14, oy + 22, 3, 2);
}

// --- HUD ---
function formatCash(n) {
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + Math.floor(n / 1000) + 'K';
  return '$' + n;
}

function drawHUD(ctx) {
  // Background bar
  ctx.fillStyle = PAL.hudBg;
  ctx.fillRect(0, 0, 640, 28);
  ctx.fillStyle = '#2A2A3E';
  ctx.fillRect(0, 28, 640, 1);

  // Day
  drawText(ctx, 'DAY ' + gameState.day, 8, 8, PAL.white, 1);

  // Cash
  drawText(ctx, formatCash(gameState.cash), 140, 8, PAL.gold, 1);

  // MRR
  drawText(ctx, 'MRR: ' + formatCash(gameState.mrr), 270, 8, PAL.teal, 1);

  // AP pips
  const apStr = 'AP: ';
  drawText(ctx, apStr, 440, 8, PAL.white, 1);
  const apX = 440 + measureText(apStr, 1).width + 4;
  for (let i = 0; i < gameState.maxAP; i++) {
    ctx.fillStyle = i < gameState.ap ? PAL.gold : '#333344';
    // Diamond pip
    const dx = apX + i * 12;
    const dy = 11;
    ctx.beginPath();
    ctx.moveTo(dx, dy - 4);
    ctx.lineTo(dx + 4, dy);
    ctx.lineTo(dx, dy + 4);
    ctx.lineTo(dx - 4, dy);
    ctx.closePath();
    ctx.fill();
  }
}

// --- Input ---
const keysDown = {};

function handleInput(e) {
  keysDown[e.code] = true;

  // Prevent scrolling
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Tab'].includes(e.key) ||
      ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Tab'].includes(e.code)) {
    e.preventDefault();
  }

  switch (gameState.screen) {
    case 'title':
      handleTitleInput(e.code);
      break;
    case 'characterCreation':
      handleCharCreationInput(e.code);
      break;
    case 'play':
      handlePlayInput(e.code);
      break;
    case 'dialogue':
      handleDialogueInput(e.code);
      break;
    case 'laptopMenu':
      handleLaptopInput(e.code);
      break;
  }
}

function handleInputUp(e) {
  delete keysDown[e.code];
}

window.addEventListener('keydown', handleInput);
window.addEventListener('keyup', handleInputUp);

// --- Title Screen ---
function handleTitleInput(key) {
  if (key === 'Space' || key === 'Enter') {
    gameState.screen = 'characterCreation';
    gameState.charSelect = 1; // default to middle
  }
}

function drawTitleScreen(ctx) {
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);

  // Title
  const title = 'SAAS QUEST';
  const tw = measureText(title, 5);
  drawText(ctx, title, Math.floor((640 - tw.width) / 2), 80, PAL.gold, 5);

  // Subtitle
  const sub = 'Startup Simulator';
  const sw = measureText(sub, 2);
  drawText(ctx, sub, Math.floor((640 - sw.width) / 2), 140, PAL.teal, 2);

  // Blinking PRESS START
  gameState.titleBlink += 1;
  if (Math.floor(gameState.titleBlink / 30) % 2 === 0) {
    const ps = 'PRESS START';
    const pw = measureText(ps, 2);
    drawText(ctx, ps, Math.floor((640 - pw.width) / 2), 260, PAL.white, 2);
  }

  // Credits line
  const cr = 'GTM STUDIO 2026';
  const cw = measureText(cr, 1);
  drawText(ctx, cr, Math.floor((640 - cw.width) / 2), 330, '#555566', 1);
}

// --- Character Creation ---
const ROLES = [
  {
    name: 'HACKER',
    stats: ['+2 Dev Speed', '+1 Debug Luck', '-1 Sales'],
    color: '#40A0A0',
    icon: 'laptop'
  },
  {
    name: 'DESIGNER',
    stats: ['+2 Product Quality', '+1 UX', '-1 Dev Speed'],
    color: '#A060C0',
    icon: 'brush'
  },
  {
    name: 'HUSTLER',
    stats: ['+2 Sales', '+1 Networking', '-1 Dev Speed'],
    color: '#C0A040',
    icon: 'megaphone'
  }
];

function handleCharCreationInput(key) {
  if (key === 'ArrowLeft' || key === 'KeyA') {
    gameState.charSelect = Math.max(0, gameState.charSelect - 1);
  } else if (key === 'ArrowRight' || key === 'KeyD') {
    gameState.charSelect = Math.min(2, gameState.charSelect + 1);
  } else if (key === 'Space' || key === 'Enter') {
    gameState.playerRole = ROLES[gameState.charSelect].name.toLowerCase();
    gameState.screen = 'play';
    // Reset player position
    const room = ROOMS[gameState.currentRoom];
    gameState.player.tileX = room.playerSpawn.x;
    gameState.player.tileY = room.playerSpawn.y;
    gameState.player.targetTileX = room.playerSpawn.x;
    gameState.player.targetTileY = room.playerSpawn.y;
    gameState.player.drawX = room.playerSpawn.x * TILE;
    gameState.player.drawY = room.playerSpawn.y * TILE + HUD_H;
    gameState.player.startDrawX = gameState.player.drawX;
    gameState.player.startDrawY = gameState.player.drawY;
    gameState.player.moving = false;
  }
}

function drawRoleIcon(ctx, type, cx, cy) {
  if (type === 'laptop') {
    ctx.fillStyle = PAL.laptop;
    ctx.fillRect(cx - 16, cy - 8, 32, 20);
    ctx.fillStyle = '#80C0E0';
    ctx.fillRect(cx - 13, cy - 5, 26, 14);
    ctx.fillStyle = '#666';
    ctx.fillRect(cx - 20, cy + 13, 40, 3);
  } else if (type === 'brush') {
    ctx.fillStyle = '#C09060';
    ctx.fillRect(cx - 2, cy - 14, 4, 22);
    ctx.fillStyle = '#E06060';
    ctx.fillRect(cx - 5, cy + 6, 10, 8);
    ctx.fillStyle = '#A04040';
    ctx.fillRect(cx - 3, cy + 8, 6, 4);
  } else if (type === 'megaphone') {
    ctx.fillStyle = '#D0A040';
    ctx.fillRect(cx - 4, cy - 4, 10, 8);
    ctx.fillRect(cx + 6, cy - 8, 6, 16);
    ctx.fillRect(cx + 12, cy - 12, 6, 24);
    ctx.fillStyle = '#B08030';
    ctx.fillRect(cx - 8, cy - 2, 6, 4);
  }
}

function drawCharacterCreation(ctx) {
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);

  // Header
  const hdr = 'CHOOSE YOUR ROLE';
  const hw = measureText(hdr, 2);
  drawText(ctx, hdr, Math.floor((640 - hw.width) / 2), 20, PAL.gold, 2);

  const cardW = 170;
  const cardH = 220;
  const gap = 20;
  const totalW = cardW * 3 + gap * 2;
  const startX = Math.floor((640 - totalW) / 2);
  const cardY = 60;

  for (let i = 0; i < 3; i++) {
    const role = ROLES[i];
    const cx = startX + i * (cardW + gap);
    const selected = i === gameState.charSelect;

    // Card background
    ctx.fillStyle = selected ? '#2A2A4E' : '#1A1A2E';
    ctx.fillRect(cx, cardY, cardW, cardH);

    // Border
    ctx.strokeStyle = selected ? PAL.gold : '#404060';
    ctx.lineWidth = selected ? 3 : 1;
    ctx.strokeRect(cx, cardY, cardW, cardH);

    // Role icon
    drawRoleIcon(ctx, role.icon, cx + cardW / 2, cardY + 50);

    // Role name
    const nw = measureText(role.name, 2);
    drawText(ctx, role.name, cx + Math.floor((cardW - nw.width) / 2), cardY + 90, role.color, 2);

    // Stats
    for (let s = 0; s < role.stats.length; s++) {
      const stat = role.stats[s];
      const col = stat.startsWith('+') ? PAL.success : PAL.danger;
      const stw = measureText(stat, 1);
      drawText(ctx, stat, cx + Math.floor((cardW - stw.width) / 2), cardY + 130 + s * 18, col, 1);
    }

    // Selection arrow
    if (selected) {
      const arrowY = cardY + cardH + 8;
      ctx.fillStyle = PAL.gold;
      ctx.beginPath();
      ctx.moveTo(cx + cardW / 2, arrowY + 8);
      ctx.lineTo(cx + cardW / 2 - 6, arrowY);
      ctx.lineTo(cx + cardW / 2 + 6, arrowY);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Instruction
  const inst = 'Arrow Keys to Select  -  Enter to Confirm';
  const iw = measureText(inst, 1);
  drawText(ctx, inst, Math.floor((640 - iw.width) / 2), 320, '#888899', 1);
}

// --- Tile Movement ---
const MOVE_SPEED = 150; // ms for one tile move

function handlePlayInput(key) {
  if (key === 'KeyE' || key === 'Space') {
    checkInteraction();
  }
}

function updateMovement(dt) {
  if (gameState.screen !== 'play') return;

  const p = gameState.player;

  if (p.moving) {
    p.moveProgress += dt;
    const t = Math.min(p.moveProgress / MOVE_SPEED, 1);
    // Ease in-out
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    const targetDrawX = p.targetTileX * TILE;
    const targetDrawY = p.targetTileY * TILE + HUD_H;
    p.drawX = p.startDrawX + (targetDrawX - p.startDrawX) * ease;
    p.drawY = p.startDrawY + (targetDrawY - p.startDrawY) * ease;

    if (t >= 1) {
      p.tileX = p.targetTileX;
      p.tileY = p.targetTileY;
      p.drawX = targetDrawX;
      p.drawY = targetDrawY;
      p.moving = false;
      p.moveProgress = 0;
    }
    return; // No new moves while interpolating
  }

  // Check for held keys
  let dx = 0, dy = 0, newFacing = null;
  if (keysDown['ArrowUp'] || keysDown['KeyW']) { dy = -1; newFacing = 'up'; }
  else if (keysDown['ArrowDown'] || keysDown['KeyS']) { dy = 1; newFacing = 'down'; }
  else if (keysDown['ArrowLeft'] || keysDown['KeyA']) { dx = -1; newFacing = 'left'; }
  else if (keysDown['ArrowRight'] || keysDown['KeyD']) { dx = 1; newFacing = 'right'; }

  if (newFacing) {
    p.facing = newFacing;
    const nx = p.tileX + dx;
    const ny = p.tileY + dy;
    if (!isCollision(nx, ny)) {
      p.targetTileX = nx;
      p.targetTileY = ny;
      p.startDrawX = p.drawX;
      p.startDrawY = p.drawY;
      p.moving = true;
      p.moveProgress = 0;
    }
  }
}

// --- NPC Interaction ---
function getFacingTile() {
  const p = gameState.player;
  let tx = p.tileX, ty = p.tileY;
  switch (p.facing) {
    case 'up': ty--; break;
    case 'down': ty++; break;
    case 'left': tx--; break;
    case 'right': tx++; break;
  }
  return { x: tx, y: ty };
}

function checkInteraction() {
  const ft = getFacingTile();
  const room = ROOMS[gameState.currentRoom];

  // Check Jordan
  if (room.jordan && ft.x === room.jordan.x && ft.y === room.jordan.y) {
    showDialogue('Jordan', [
      "Hey. You're finally up.",
      "We've got $150K and zero customers.",
      "Maybe check the laptop. We should get to work."
    ]);
    return;
  }

  // Check laptop
  if (room.laptop && ft.x === room.laptop.x && ft.y === room.laptop.y) {
    showLaptopMenu();
    return;
  }
}

function isAdjacentTo(targetX, targetY) {
  const p = gameState.player;
  const dx = Math.abs(p.tileX - targetX);
  const dy = Math.abs(p.tileY - targetY);
  return (dx + dy === 1);
}

function isFacing(targetX, targetY) {
  const ft = getFacingTile();
  return ft.x === targetX && ft.y === targetY;
}

function drawInteractionPrompt(ctx) {
  if (gameState.screen !== 'play' || gameState.player.moving) return;

  const room = ROOMS[gameState.currentRoom];
  const ft = getFacingTile();

  // Jordan prompt
  if (room.jordan && ft.x === room.jordan.x && ft.y === room.jordan.y) {
    const px = room.jordan.x * TILE + TILE / 2;
    const py = room.jordan.y * TILE + HUD_H - 8;
    const txt = '[E] Talk';
    const tw = measureText(txt, 1);
    drawText(ctx, txt, Math.floor(px - tw.width / 2), py, PAL.gold, 1);
  }

  // Laptop prompt
  if (room.laptop && ft.x === room.laptop.x && ft.y === room.laptop.y) {
    const px = room.laptop.x * TILE + TILE / 2;
    const py = room.laptop.y * TILE + HUD_H - 8;
    const txt = '[E] Use';
    const tw = measureText(txt, 1);
    drawText(ctx, txt, Math.floor(px - tw.width / 2), py, PAL.gold, 1);
  }
}

// --- Dialogue System ---
function showDialogue(speakerName, lines) {
  gameState.dialogue = {
    speaker: speakerName,
    lines: lines,
    currentLine: 0
  };
  gameState.screen = 'dialogue';
}

function advanceDialogue() {
  if (!gameState.dialogue) return;
  gameState.dialogue.currentLine++;
  if (gameState.dialogue.currentLine >= gameState.dialogue.lines.length) {
    gameState.dialogue = null;
    gameState.screen = 'play';
  }
}

function handleDialogueInput(key) {
  if (key === 'Space' || key === 'Enter' || key === 'KeyE') {
    advanceDialogue();
  }
}

function wrapText(text, maxWidth, scale) {
  const words = text.split(' ');
  const lines = [];
  let currentLine = '';
  for (const word of words) {
    const test = currentLine ? currentLine + ' ' + word : word;
    if (measureText(test, scale).width > maxWidth) {
      if (currentLine) lines.push(currentLine);
      currentLine = word;
    } else {
      currentLine = test;
    }
  }
  if (currentLine) lines.push(currentLine);
  return lines;
}

function drawDialogue(ctx) {
  if (!gameState.dialogue) return;

  const boxH = 80;
  const boxY = 360 - boxH;
  const boxX = 16;
  const boxW = 640 - 32;

  // Background
  ctx.fillStyle = '#1A1A3A';
  ctx.fillRect(boxX, boxY, boxW, boxH);

  // Border
  ctx.strokeStyle = '#4040A0';
  ctx.lineWidth = 2;
  ctx.strokeRect(boxX, boxY, boxW, boxH);

  // Speaker name
  drawText(ctx, gameState.dialogue.speaker, boxX + 10, boxY + 6, PAL.gold, 1);

  // Text
  const line = gameState.dialogue.lines[gameState.dialogue.currentLine];
  const wrapped = wrapText(line, boxW - 24, 1);
  for (let i = 0; i < wrapped.length; i++) {
    drawText(ctx, wrapped[i], boxX + 10, boxY + 22 + i * 14, PAL.text, 1);
  }

  // Continue indicator
  const blink = Math.floor(Date.now() / 400) % 2;
  if (blink === 0) {
    ctx.fillStyle = PAL.text;
    ctx.fillRect(boxX + boxW - 20, boxY + boxH - 14, 6, 6);
  }
}

// --- Laptop Menu ---
const LAPTOP_OPTIONS = ['END DAY', 'CHECK STATS'];

function showLaptopMenu() {
  gameState.laptopMenu.selected = 0;
  gameState.screen = 'laptopMenu';
}

function handleLaptopInput(key) {
  if (key === 'ArrowUp' || key === 'KeyW') {
    gameState.laptopMenu.selected = Math.max(0, gameState.laptopMenu.selected - 1);
  } else if (key === 'ArrowDown' || key === 'KeyS') {
    gameState.laptopMenu.selected = Math.min(LAPTOP_OPTIONS.length - 1, gameState.laptopMenu.selected + 1);
  } else if (key === 'Enter' || key === 'Space') {
    if (gameState.laptopMenu.selected === 0) {
      // End Day
      advanceDay();
    } else {
      // Check Stats — stub: just show dialogue
      gameState.screen = 'play';
      showDialogue('Laptop', [
        'Day ' + gameState.day + ' | Cash: ' + formatCash(gameState.cash) + ' | MRR: ' + formatCash(gameState.mrr),
        'Role: ' + (gameState.playerRole ? gameState.playerRole.toUpperCase() : 'NONE'),
        'Keep hustling!'
      ]);
    }
  } else if (key === 'Escape' || key === 'KeyX') {
    gameState.screen = 'play';
  }
}

function drawLaptopMenu(ctx) {
  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, 640, 360);

  const menuW = 200;
  const menuH = 120;
  const mx = Math.floor((640 - menuW) / 2);
  const my = Math.floor((360 - menuH) / 2);

  // Menu bg
  ctx.fillStyle = '#1A1A3A';
  ctx.fillRect(mx, my, menuW, menuH);
  ctx.strokeStyle = PAL.teal;
  ctx.lineWidth = 2;
  ctx.strokeRect(mx, my, menuW, menuH);

  // Title
  const title = 'LAPTOP';
  const tw = measureText(title, 2);
  drawText(ctx, title, mx + Math.floor((menuW - tw.width) / 2), my + 10, PAL.teal, 2);

  // Options
  for (let i = 0; i < LAPTOP_OPTIONS.length; i++) {
    const opt = LAPTOP_OPTIONS[i];
    const selected = i === gameState.laptopMenu.selected;
    const oy = my + 45 + i * 25;
    if (selected) {
      ctx.fillStyle = '#2A2A5E';
      ctx.fillRect(mx + 8, oy - 3, menuW - 16, 18);
      drawText(ctx, '>', mx + 14, oy, PAL.gold, 1);
    }
    drawText(ctx, opt, mx + 28, oy, selected ? PAL.gold : PAL.text, 1);
  }

  // Footer
  drawText(ctx, 'ESC to close', mx + 10, my + menuH - 16, '#555566', 1);
}

// --- Day Cycle ---
function resetAP() {
  gameState.ap = gameState.maxAP;
}

function spendAP(cost) {
  if (gameState.ap >= cost) {
    gameState.ap -= cost;
    return true;
  }
  return false;
}

function advanceDay() {
  gameState.screen = 'dayTransition';
  gameState.dayTransition = { timer: 0, phase: 'fadeOut', totalDuration: 1500 };
}

function updateDayTransition(dt) {
  const t = gameState.dayTransition;
  t.timer += dt;

  if (t.phase === 'fadeOut' && t.timer >= 400) {
    // Advance the day
    gameState.day++;
    resetAP();
    t.phase = 'splash';
    t.timer = 0;
  } else if (t.phase === 'splash' && t.timer >= 800) {
    t.phase = 'fadeIn';
    t.timer = 0;
  } else if (t.phase === 'fadeIn' && t.timer >= 300) {
    gameState.screen = 'play';
  }
}

function drawDayTransition(ctx) {
  const t = gameState.dayTransition;

  if (t.phase === 'fadeOut') {
    // Draw current scene underneath
    drawPlayScreen(ctx);
    // Fade overlay
    const alpha = Math.min(t.timer / 400, 1);
    ctx.fillStyle = 'rgba(0,0,0,' + alpha + ')';
    ctx.fillRect(0, 0, 640, 360);
  } else if (t.phase === 'splash') {
    ctx.fillStyle = PAL.black;
    ctx.fillRect(0, 0, 640, 360);
    const dayStr = 'DAY ' + gameState.day;
    const dw = measureText(dayStr, 4);
    drawText(ctx, dayStr, Math.floor((640 - dw.width) / 2), 140, PAL.gold, 4);

    // Week indicator
    const weekStr = 'Week ' + gameState.day;
    const ww = measureText(weekStr, 2);
    drawText(ctx, weekStr, Math.floor((640 - ww.width) / 2), 200, PAL.teal, 2);
  } else if (t.phase === 'fadeIn') {
    drawPlayScreen(ctx);
    const alpha = 1 - Math.min(t.timer / 300, 1);
    ctx.fillStyle = 'rgba(0,0,0,' + alpha + ')';
    ctx.fillRect(0, 0, 640, 360);
  }
}

// --- Play Screen ---
function drawPlayScreen(ctx) {
  // Room
  drawRoom(ctx);

  // Jordan
  const room = ROOMS[gameState.currentRoom];
  if (room.jordan) {
    drawJordan(ctx, room.jordan.x * TILE, room.jordan.y * TILE + HUD_H);
  }

  // Player
  drawPlayer(ctx, gameState.player.drawX, gameState.player.drawY, gameState.player.facing);

  // HUD
  drawHUD(ctx);

  // Interaction prompts
  drawInteractionPrompt(ctx);
}

// --- Game Loop ---
let lastTime = 0;

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  let dt = timestamp - lastTime;
  lastTime = timestamp;
  if (dt > 50) dt = 50; // cap

  update(dt);
  draw(ctx);
  requestAnimationFrame(gameLoop);
}

function update(dt) {
  switch (gameState.screen) {
    case 'play':
      updateMovement(dt);
      break;
    case 'dayTransition':
      updateDayTransition(dt);
      break;
  }
}

function draw(ctx) {
  // Clear
  ctx.fillStyle = PAL.bg;
  ctx.fillRect(0, 0, 640, 360);

  switch (gameState.screen) {
    case 'title':
      drawTitleScreen(ctx);
      break;
    case 'characterCreation':
      drawCharacterCreation(ctx);
      break;
    case 'play':
      drawPlayScreen(ctx);
      break;
    case 'dialogue':
      drawPlayScreen(ctx);
      drawDialogue(ctx);
      break;
    case 'laptopMenu':
      drawPlayScreen(ctx);
      drawLaptopMenu(ctx);
      break;
    case 'dayTransition':
      drawDayTransition(ctx);
      break;
  }
}

// --- Init ---
initCanvas();
requestAnimationFrame(gameLoop);

</script>
