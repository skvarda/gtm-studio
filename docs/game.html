function drawText(ctx, text, x, y, color, scale) {
  if (scale === undefined) scale = 1;
  ctx.fillStyle = color; let cx = x;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], glyph = FONT_DATA[ch];
    if (ch === ' ') { cx += 4*scale; continue; }
    if (!glyph) { cx += (FONT_W+1)*scale; continue; }
    for (let r = 0; r < FONT_H; r++) for (let c = 0; c < FONT_W; c++)
      if (glyph[r*FONT_W+c]) ctx.fillRect(cx+c*scale, y+r*scale, scale, scale);
    cx += (FONT_W+1)*scale;
  }
}
function measureText(text, scale) {
  if (scale === undefined) scale = 1; let w = 0;
  for (let i = 0; i < text.length; i++) w += (text[i]===' ') ? 4*scale : (FONT_W+1)*scale;
  if (text.length > 0) w -= 1*scale;
  return { width: w, height: FONT_H*scale };
}

const economy = {
  customers: 0, avgRevPerCustomer: 99, employees: [], burnRate: 0,
  churnRate: 0.05, productQuality: 10, salesPipeline: 0, marketingLeads: 0
};
function calculateMRR() { return economy.customers * economy.avgRevPerCustomer; }
function calculateBurnRate() {
  let s = 0; for (const e of economy.employees) s += e.salary; return s + 2000;
}
function economyTick() {
  const churned = Math.floor(economy.customers * economy.churnRate);
  economy.customers = Math.max(0, economy.customers - churned);
  if (economy.salesPipeline > 0) {
    const c = Math.max(1, Math.floor(economy.salesPipeline * 0.3));
    economy.customers += c; economy.salesPipeline = Math.max(0, economy.salesPipeline - c);
  }
  if (economy.marketingLeads > 0) {
    const q = Math.max(1, Math.floor(economy.marketingLeads * 0.4));
    economy.salesPipeline += q; economy.marketingLeads = Math.max(0, economy.marketingLeads - q);
  }
  gameState.mrr = calculateMRR();
  economy.burnRate = calculateBurnRate();
  const net = gameState.mrr - economy.burnRate;
  gameState.cash += net;
  for (const e of economy.employees) if (e.type==='dev') economy.productQuality += e.skill * 0.5;
  return { revenue: gameState.mrr, burn: economy.burnRate, net: net, churned: churned, newCustomers: economy.customers };
}
function getRunway() {
  const net = gameState.mrr - calculateBurnRate();
  if (net >= 0) return 999;
  return Math.floor(gameState.cash / Math.abs(net));
}

// --- Transitions ---
function transitionToScreen(targetState, callback) {
  gameState.transition.active=true; gameState.transition.timer=0;
  gameState.transition.phase='fadeOut'; gameState.transition.targetState=targetState;
  gameState.transition.callback=callback||null;
}
function updateTransition(dt) {
  var t=gameState.transition; if(!t.active) return; t.timer+=dt;
  if (t.phase==='fadeOut' && t.timer>=300) {
    gameState.screen=t.targetState; if(t.callback)t.callback(); t.phase='fadeIn'; t.timer=0;
  } else if (t.phase==='fadeIn' && t.timer>=300) { t.active=false; t.phase='none'; }
}
function drawTransitionOverlay(ctx) {
  var t=gameState.transition; if(!t.active) return;
  var a=0;
  if(t.phase==='fadeOut') a=Math.min(t.timer/300,1);
  else if(t.phase==='fadeIn') a=1-Math.min(t.timer/300,1);
  ctx.fillStyle='rgba(0,0,0,'+a+')'; ctx.fillRect(0,0,640,360);
}

function transitionToRoom(targetRoom, spawnKey) {
  gameState.locTransition.active=true; gameState.locTransition.timer=0;
  gameState.locTransition.phase='fadeOut'; gameState.locTransition.targetRoom=targetRoom;
  gameState.locTransition.targetSpawn=spawnKey||'playerSpawn';
}
function updateLocTransition(dt) {
  var lt=gameState.locTransition; if(!lt.active) return; lt.timer+=dt;
  if (lt.phase==='fadeOut' && lt.timer>=250) {
    gameState.currentRoom=lt.targetRoom;
    var room=ROOMS[lt.targetRoom], spawn=room[lt.targetSpawn]||room.playerSpawn, p=gameState.player;
    p.tileX=spawn.x; p.tileY=spawn.y; p.targetTileX=spawn.x; p.targetTileY=spawn.y;
    p.drawX=spawn.x*TILE; p.drawY=spawn.y*TILE+HUD_H;
    p.startDrawX=p.drawX; p.startDrawY=p.drawY; p.moving=false; p.moveProgress=0;
    lt.phase='fadeIn'; lt.timer=0;
  } else if (lt.phase==='fadeIn' && lt.timer>=250) { lt.active=false; lt.phase='none'; }
}
function drawLocTransitionOverlay(ctx) {
  var lt=gameState.locTransition; if(!lt.active) return;

  var room=ROOMS[gameState.currentRoom];

  if(room.npcs) for(var i=0;i<room.npcs.length;i++) if(room.npcs[i].x===tx&&room.npcs[i].y===ty) return true;
  return false;
}

// --- HUD ---
function formatCash(n) {
  if(n>=1000000) return '$'+(n/1000000).toFixed(1)+'M';
  if(n>=1000) return '$'+Math.floor(n/1000)+'K';
  return '$'+n;
}

function drawHUD(ctx) {
  ctx.fillStyle=PAL.hudBg; ctx.fillRect(0,0,640,28);
  ctx.fillStyle='#2A2A3E'; ctx.fillRect(0,28,640,1);
  drawText(ctx,'DAY '+gameState.day,8,4,PAL.white,1);
  var room=ROOMS[gameState.currentRoom];
  drawText(ctx,room.name,8,16,PAL.textDim,1);
  drawText(ctx,formatCash(gameState.cash),130,4,PAL.gold,1);
  var runway=getRunway();
  var rStr=runway>=999?'PROFIT':runway+'wk';
  drawText(ctx,'RWY:'+rStr,130,16,runway>=999?PAL.success:(runway<12?PAL.danger:PAL.textLight),1);
  drawText(ctx,'MRR:'+formatCash(gameState.mrr),260,4,PAL.teal,1);
  drawText(ctx,economy.customers+' CUST',260,16,PAL.textLight,1);
  drawText(ctx,'AP:',420,4,PAL.white,1);
  var apX=420+measureText('AP:',1).width+4;
  for(var i=0;i<gameState.maxAP;i++){
    ctx.fillStyle=i<gameState.ap?PAL.gold:'#333344';
    var dx=apX+i*12,dy=8;
    ctx.beginPath();ctx.moveTo(dx,dy-4);ctx.lineTo(dx+4,dy);ctx.lineTo(dx,dy+4);ctx.lineTo(dx-4,dy);ctx.closePath();ctx.fill();
  }
  drawText(ctx,'Q:'+Math.floor(economy.productQuality),420,16,PAL.teal,1);
  if(economy.salesPipeline>0) drawText(ctx,'PIPE:'+economy.salesPipeline,530,4,PAL.amber,1);
  if(economy.marketingLeads>0) drawText(ctx,'LEAD:'+economy.marketingLeads,530,16,PAL.magenta,1);
}

// --- Input ---
var keysDown = {};
function handleInput(e) {
  keysDown[e.code]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Tab'].indexOf(e.key)!==-1||
     ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Tab'].indexOf(e.code)!==-1) e.preventDefault();
  if(gameState.transition.active||gameState.locTransition.active) return;
  switch(gameState.screen) {
    case 'title': handleTitleInput(e.code); break;
    case 'nameEntry': handleNameEntryInput(e); break;
    case 'characterCreation': handleCharCreationInput(e.code); break;
    case 'play': handlePlayInput(e.code); break;
    case 'dialogue': handleDialogueInput(e.code); break;
    case 'laptopMenu': handleLaptopInput(e.code); break;
    case 'activityMenu': handleActivityInput(e.code); break;
    case 'emailInbox': handleEmailInput(e.code); break;
    case 'dayReport': handleDayReportInput(e.code); break;
  }
}
function handleInputUp(e) { delete keysDown[e.code]; }
window.addEventListener('keydown', handleInput);
window.addEventListener('keyup', handleInputUp);

function handleNameEntryInput(e) {
  var key=e.key;
  if(key==='Enter'){if(gameState.nameInput.length>=1){gameState.player.name=gameState.nameInput;gameState.charSelect=1;transitionToScreen('characterCreation');}return;}
  if(key==='Backspace'){if(gameState.nameInput.length>0)gameState.nameInput=gameState.nameInput.slice(0,-1);return;}
  if(key.length===1&&/^[a-zA-Z]$/.test(key)&&gameState.nameInput.length<10) gameState.nameInput+=key.toUpperCase();
}

    drawText(ctx,'_',cx,nameY,PAL.gold,nameScale);

// --- Movement ---
var MOVE_SPEED = 150;
function handlePlayInput(key) {
  if(key==='KeyE'||key==='Space'||key==='Enter') checkInteraction();
  else if(key==='KeyM'||key==='Tab') showActivityMenu();
}

function updateMovement(dt) {
  if(gameState.screen!=='play') return;
  var p=gameState.player;
  if(p.moving){
    p.moveProgress+=dt;
    var t=Math.min(p.moveProgress/MOVE_SPEED,1);
    var ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    var tdx=p.targetTileX*TILE, tdy=p.targetTileY*TILE+HUD_H;
    p.drawX=p.startDrawX+(tdx-p.startDrawX)*ease; p.drawY=p.startDrawY+(tdy-p.startDrawY)*ease;
    if(t>=1){p.tileX=p.targetTileX;p.tileY=p.targetTileY;p.drawX=tdx;p.drawY=tdy;p.moving=false;p.moveProgress=0;checkDoorTransition();}
    return;
  }
  var dx=0,dy=0,nf=null;
  if(keysDown['ArrowUp']||keysDown['KeyW']){dy=-1;nf='up';}
  else if(keysDown['ArrowDown']||keysDown['KeyS']){dy=1;nf='down';}
  else if(keysDown['ArrowLeft']||keysDown['KeyA']){dx=-1;nf='left';}
  else if(keysDown['ArrowRight']||keysDown['KeyD']){dx=1;nf='right';}
  if(nf){
    p.facing=nf; var nx=p.tileX+dx,ny=p.tileY+dy;
    if(!isCollision(nx,ny)){p.targetTileX=nx;p.targetTileY=ny;p.startDrawX=p.drawX;p.startDrawY=p.drawY;p.moving=true;p.moveProgress=0;}
  }
}

function checkDoorTransition() {
  var room=ROOMS[gameState.currentRoom],p=gameState.player;
  if(!room.doors) return;
  for(var i=0;i<room.doors.length;i++){var door=room.doors[i];if(p.tileX===door.x&&p.tileY===door.y){transitionToRoom(door.target,door.spawn);return;}}
}

// --- Interaction ---
function getFacingTile() {
  var p=gameState.player; var tx=p.tileX,ty=p.tileY;
  if(p.facing==='up')ty--;else if(p.facing==='down')ty++;else if(p.facing==='left')tx--;else if(p.facing==='right')tx++;
  return {x:tx,y:ty};
}

function checkInteraction() {
  var ft=getFacingTile(), room=ROOMS[gameState.currentRoom];
  if(room.npcs) for(var i=0;i<room.npcs.length;i++){var npc=room.npcs[i];if(ft.x===npc.x&&ft.y===npc.y){
    var data=NPC_DATA[npc.id]; if(data) showDialogue(data.name,getNPCDialogue(npc.id)); return;
  }}
  if(room.interactables) for(var i=0;i<room.interactables.length;i++){var obj=room.interactables[i];if(ft.x===obj.x&&ft.y===obj.y){
    if(obj.id==='laptop') showLaptopMenu();
    else if(obj.id==='whiteboard') showDialogue('Whiteboard',['Quality: '+Math.floor(economy.productQuality),'Pipeline: '+economy.salesPipeline,'Leads: '+economy.marketingLeads,'Team: '+economy.employees.length]);
    return;
  }}
  if(room.doors) for(var i=0;i<room.doors.length;i++){var door=room.doors[i];if(ft.x===door.x&&ft.y===door.y){transitionToRoom(door.target,door.spawn);return;}}
}

function drawInteractionPrompt(ctx) {
  if(gameState.screen!=='play'||gameState.player.moving) return;
  var ft=getFacingTile(), room=ROOMS[gameState.currentRoom];
  function drawPrompt(tx,ty,label) {
    var px=tx*TILE+TILE/2, py=ty*TILE+HUD_H-8, txt='[E] '+label, tw=measureText(txt,1);
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(Math.floor(px-tw.width/2)-2,py-1,tw.width+4,10);
    drawText(ctx,txt,Math.floor(px-tw.width/2),py,PAL.gold,1);
  }
  if(room.npcs) for(var i=0;i<room.npcs.length;i++){var n=room.npcs[i];if(ft.x===n.x&&ft.y===n.y) drawPrompt(n.x,n.y,(NPC_DATA[n.id]||{name:'Talk'}).name);}
  if(room.interactables) for(var i=0;i<room.interactables.length;i++){var o=room.interactables[i];if(ft.x===o.x&&ft.y===o.y) drawPrompt(o.x,o.y,o.id==='laptop'?'Laptop':'Use');}
  if(room.doors) for(var i=0;i<room.doors.length;i++){var d=room.doors[i];if(ft.x===d.x&&ft.y===d.y) drawPrompt(d.x,d.y,ROOMS[d.target].name);}
}

// --- Dialogue ---
function showDialogue(speaker,lines) { gameState.dialogue={speaker:speaker,lines:lines,currentLine:0}; gameState.screen='dialogue'; }
function advanceDialogue() { if(!gameState.dialogue) return; gameState.dialogue.currentLine++; if(gameState.dialogue.currentLine>=gameState.dialogue.lines.length){gameState.dialogue=null;gameState.screen='play';} }
function handleDialogueInput(key) { if(key==='Space'||key==='Enter'||key==='KeyE') advanceDialogue(); }
function wrapText(text,maxWidth,scale) {
  var words=text.split(' '),lines=[]; var cur='';
  for(var i=0;i<words.length;i++){var w=words[i];var test=cur?cur+' '+w:w;if(measureText(test,scale).width>maxWidth){if(cur)lines.push(cur);cur=w;}else cur=test;}
  if(cur) lines.push(cur); return lines;
}
function drawDialogue(ctx) {
  if(!gameState.dialogue) return;
  var boxH=80,boxY=360-boxH,boxX=16,boxW=640-32;
  ctx.fillStyle='#1A1A3A'; ctx.fillRect(boxX,boxY,boxW,boxH);
  ctx.strokeStyle='#4040A0'; ctx.lineWidth=2; ctx.strokeRect(boxX,boxY,boxW,boxH);
  drawText(ctx,gameState.dialogue.speaker,boxX+10,boxY+6,PAL.gold,1);
  var counter=(gameState.dialogue.currentLine+1)+'/'+gameState.dialogue.lines.length;
  drawText(ctx,counter,boxX+boxW-measureText(counter,1).width-10,boxY+6,PAL.textDim,1);
  var line=gameState.dialogue.lines[gameState.dialogue.currentLine];
  var wrapped=wrapText(line,boxW-24,1);
  for(var i=0;i<wrapped.length;i++) drawText(ctx,wrapped[i],boxX+10,boxY+22+i*14,PAL.text,1);
  if(Math.floor(Date.now()/400)%2===0){ctx.fillStyle=PAL.text;ctx.fillRect(boxX+boxW-20,boxY+boxH-14,6,6);}
}

var LAPTOP_OPTIONS = ['CHECK EMAIL','ACTIVITIES','TEAM STATUS','END DAY'];
function showLaptopMenu() { gameState.laptopMenu.selected=0; gameState.screen='laptopMenu'; }
function handleLaptopInput(key) {
  if(key==='ArrowUp'||key==='KeyW') gameState.laptopMenu.selected=Math.max(0,gameState.laptopMenu.selected-1);
  else if(key==='ArrowDown'||key==='KeyS') gameState.laptopMenu.selected=Math.min(LAPTOP_OPTIONS.length-1,gameState.laptopMenu.selected+1);
  else if(key==='Enter'||key==='Space'){

        'Burn: '+formatCash(calculateBurnRate())+'/wk'];

// --- Activity Menu ---
function showActivityMenu() { gameState.activityMenu.selected=0; gameState.screen='activityMenu'; }
function handleActivityInput(key) {
  var keys=Object.keys(ACTIVITIES);
  if(key==='ArrowUp'||key==='KeyW') gameState.activityMenu.selected=Math.max(0,gameState.activityMenu.selected-1);

// --- Email ---
function openEmailInbox() {
  var emails=generateDailyEmails();
  if(emails.length===0){gameState.screen='play';showDialogue('Inbox',['No new emails today.']);return;}
  gameState.emailInbox.emails=emails; gameState.emailInbox.currentIndex=0; gameState.emailInbox.reading=false;
  gameState.screen='emailInbox';
}
function handleEmailInput(key) {
  var inbox=gameState.emailInbox;
  if(inbox.reading){
    if(key==='Space'||key==='Enter'||key==='Escape'){
      var email=inbox.emails[inbox.currentIndex];
      if(email.action){
        if(email.action.type==='pipeline') economy.salesPipeline+=email.action.value;
        else if(email.action.type==='quality') economy.productQuality=Math.max(0,economy.productQuality+email.action.value);
        else if(email.action.type==='leads') economy.marketingLeads+=email.action.value;
      }
      inbox.reading=false; inbox.currentIndex++;
      if(inbox.currentIndex>=inbox.emails.length) gameState.screen='play';
    }
  } else {
    if(key==='Space'||key==='Enter') inbox.reading=true;
    else if(key==='Escape') gameState.screen='play';
  }
}
function drawEmailInbox(ctx) {
  ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fillRect(0,0,640,360);
  var inbox=gameState.emailInbox,mW=440,mH=240,mx=Math.floor((640-mW)/2),my=Math.floor((360-mH)/2);

  ctx.strokeStyle=PAL.teal; ctx.lineWidth=2; ctx.strokeRect(mx,my,mW,mH);
  drawText(ctx,'INBOX ('+(inbox.currentIndex+1)+'/'+inbox.emails.length+')',mx+10,my+8,PAL.teal,2);
  if(inbox.currentIndex<inbox.emails.length){
    var email=inbox.emails[inbox.currentIndex];
    var pColor=email.priority==='urgent'?PAL.danger:email.priority==='opportunity'?PAL.gold:email.priority==='warning'?PAL.amber:PAL.textLight;
    ctx.fillStyle=pColor; ctx.fillRect(mx+10,my+36,8,8);
    drawText(ctx,email.priority.toUpperCase(),mx+22,my+37,pColor,1);
    drawText(ctx,email.subject,mx+10,my+55,PAL.gold,2);
    drawText(ctx,'FROM: '+email.from,mx+10,my+80,PAL.textDim,1);
    if(inbox.reading){
      var bodyLines=wrapText(email.body,mW-30,1);
      for(var i=0;i<bodyLines.length;i++) drawText(ctx,bodyLines[i],mx+10,my+105+i*14,PAL.text,1);
      if(email.action){

        if(email.action.type==='pipeline') at='+'+email.action.value+' PIPELINE';

      }
      drawText(ctx,'SPACE TO CONTINUE',mx+10,my+mH-16,PAL.textDim,1);
    } else drawText(ctx,'SPACE TO READ',mx+10,my+mH-16,PAL.textDim,1);
  }
  drawText(ctx,'ESC skip',mx+mW-80,my+mH-16,PAL.textDim,1);

// --- Day Cycle ---
function resetAP() { gameState.ap=gameState.maxAP; }
function advanceDay() {
  var report=economyTick(); gameState.dayReport=report;
  gameState.screen='dayTransition'; gameState.dayTransition={timer:0,phase:'fadeOut'};
}
function updateDayTransition(dt) {
  var t=gameState.dayTransition; t.timer+=dt;
  if(t.phase==='fadeOut'&&t.timer>=400){gameState.day++;resetAP();t.phase='splash';t.timer=0;}
  else if(t.phase==='splash'&&t.timer>=1200){t.phase='fadeIn';t.timer=0;}
  else if(t.phase==='fadeIn'&&t.timer>=300) gameState.screen='dayReport';
}
function drawDayTransition(ctx) {
  var t=gameState.dayTransition;
  if(t.phase==='fadeOut'){drawPlayScreen(ctx);ctx.fillStyle='rgba(0,0,0,'+Math.min(t.timer/400,1)+')';ctx.fillRect(0,0,640,360);}
  else if(t.phase==='splash'){
    ctx.fillStyle=PAL.black; ctx.fillRect(0,0,640,360);
    var ds='DAY '+gameState.day; drawText(ctx,ds,Math.floor((640-measureText(ds,4).width)/2),120,PAL.gold,4);
    var ws='WEEK '+gameState.day; drawText(ctx,ws,Math.floor((640-measureText(ws,2).width)/2),170,PAL.teal,2);
    drawText(ctx,formatCash(gameState.cash),Math.floor((640-measureText(formatCash(gameState.cash),2).width)/2),210,PAL.gold,2);
    if(gameState.cash<=0){var go='GAME OVER';drawText(ctx,go,Math.floor((640-measureText(go,3).width)/2),260,PAL.danger,3);}
  } else if(t.phase==='fadeIn'){drawPlayScreen(ctx);ctx.fillStyle='rgba(0,0,0,'+(1-Math.min(t.timer/300,1))+')';ctx.fillRect(0,0,640,360);}
}

  var r=gameState.dayReport||{revenue:0,burn:0,net:0,churned:0,newCustomers:0};
  var ly=my+40;
  drawText(ctx,'Revenue:  '+formatCash(r.revenue),mx+20,ly,PAL.teal,1); ly+=16;
  drawText(ctx,'Burn:     '+formatCash(r.burn),mx+20,ly,PAL.danger,1); ly+=16;

  drawText(ctx,'Cash:     '+formatCash(gameState.cash),mx+20,ly,PAL.gold,1); ly+=20;
  drawText(ctx,'Customers: '+economy.customers,mx+20,ly,PAL.text,1); ly+=16;
  drawText(ctx,'Churned:   '+r.churned,mx+20,ly,r.churned>0?PAL.danger:PAL.textDim,1); ly+=16;
  drawText(ctx,'Pipeline:  '+economy.salesPipeline,mx+20,ly,PAL.amber,1); ly+=16;
  drawText(ctx,'Quality:   '+Math.floor(economy.productQuality),mx+20,ly,PAL.teal,1); ly+=16;
  if(economy.employees.length>0){drawText(ctx,'Team: '+economy.employees.map(function(e){return e.name;}).join(', '),mx+20,ly,PAL.textLight,1);ly+=16;}
  var runway=getRunway();
  drawText(ctx,'Runway: '+(runway>=999?'PROFITABLE':runway+' weeks'),mx+20,ly,runway>=999?PAL.success:(runway<12?PAL.danger:PAL.textLight),1);
  drawText(ctx,'PRESS SPACE TO CONTINUE',mx+Math.floor((mW-measureText('PRESS SPACE TO CONTINUE',1).width)/2),my+mH-18,PAL.textDim,1);
}

// --- Play Screen ---
function drawPlayScreen(ctx) {
  drawRoom(ctx);
  var room=ROOMS[gameState.currentRoom];
  if(room.npcs) for(var i=0;i<room.npcs.length;i++){var npc=room.npcs[i];drawNPCSprite(ctx,npc.id,npc.x*TILE,npc.y*TILE+HUD_H);}
  drawPlayer(ctx,gameState.player.drawX,gameState.player.drawY,gameState.player.facing);
  drawHUD(ctx);
  drawInteractionPrompt(ctx);
}

// --- Game Loop ---
var lastTime = 0;
function gameLoop(timestamp) {
  if(!lastTime) lastTime=timestamp;
  var dt=timestamp-lastTime; lastTime=timestamp;
  if(dt>50) dt=50;
  update(dt); draw(ctx);
  requestAnimationFrame(gameLoop);
}
function update(dt) {
  updateTransition(dt); updateLocTransition(dt);
  if(gameState.screen==='play') updateMovement(dt);
  else if(gameState.screen==='dayTransition') updateDayTransition(dt);
}
function draw(ctx) {
  ctx.fillStyle=PAL.bg; ctx.fillRect(0,0,640,360);
  switch(gameState.screen) {
    case 'title': drawTitleScreen(ctx); break;
    case 'nameEntry': drawNameEntry(ctx); break;
    case 'characterCreation': drawCharacterCreation(ctx); break;
    case 'play': drawPlayScreen(ctx); break;
    case 'dialogue': drawPlayScreen(ctx); drawDialogue(ctx); break;
    case 'laptopMenu': drawPlayScreen(ctx); drawLaptopMenu(ctx); break;
    case 'activityMenu': drawPlayScreen(ctx); drawActivityMenu(ctx); break;
    case 'emailInbox': drawPlayScreen(ctx); drawEmailInbox(ctx); break;
    case 'dayTransition': drawDayTransition(ctx); break;
    case 'dayReport': drawPlayScreen(ctx); drawDayReport(ctx); break;
  }
  drawTransitionOverlay(ctx); drawLocTransitionOverlay(ctx);
}

initCanvas();
requestAnimationFrame(gameLoop);
</script>
